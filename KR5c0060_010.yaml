front:
  text: 唐玄宗御製道德真經疏卷之十效十
  hash: sha256:b1ce94150226683315fce91dc83e7908416c95a888ad3ea13799bb95db225d5f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0060_HFL_010-001a, image: hfl/0357/0357-146.png}
body:
  text: 民常不畏章第七十四前章明勇敢於有為自成殺身之咎此章明有為則輕死必犯司殺之誅首五句陳戒用刑次一句指明司殺後四句舉用刑代殺必有愆咎民常不畏死奈何以死懼之疏言人不能守道清靜而放縱情欲動之死地積習生常曾無畏者人君當以清靜為化而教導之奈何更以刑法誅殺恐懼之乎若使民常畏死而為奇者吾得執而殺之孰敢疏此明人君化以無為人皆少欲各全其生常畏於死而獨有為於奇詐不善之行者適令吾勢得執而殺之亦孰敢即殺所以不殺為自有天網司殺之也故下文云常有司殺者殺疏司主也天監孔明無所不察奇詐之人不得其死是有天之司殺者殺之矣夫代司殺者殺是謂代大匠斫疏言不善之人司殺自殺人君用勢得執殺而便殺之是代司殺者殺人不得天理猶如拙夫代大匠斫木矣夫代大匠斫希有不傷其手矣疏大匠斫木動合方圓拙夫代之必失繩纏惡得不損其材而傷其手乎天網不失神理昭明人君任刑代彼司殺惡得不害於人而喪其天和乎奈何以死懼之斯之謂也人之飢章第七十五前章明有為則輕死必犯司殺之誅此章明厚斂則人貧是生有為之弊初三段迭明所以為弊夫唯下結嘆令其貴生民之飢以其上食稅之多是以飢疏夫人國之本也若政煩賦重而人貧乏則國本斯弊弊則危矣是以下人不足由君上食用賦粳之太多是以令其飢乏爾民之難理以其上之有為是以難理疏蠢爾蒼生資君以理為理之本諒在無為故我無為而人自化今人所以難理者由君上之有為有為則政煩而人擾動生大偽是以難理民之輕死以其求生之厚是以輕死疏人之所以輕入死地喪其生者皆以其違分求生養生太厚不顧刑網以徇所求是以輕死夫唯無以生為者是賢於貴生疏夫生也有涯安分則足既不可違亦不可加若營生於至當之外則惑矣故不厚其生而生全求厚生而生喪故知夫無以生為憂者是賢勝於矜貴其生之人人之生章第七十六前章明厚斂則人貧是生有為之弊此章明有為則心欲故喪和氣之柔初標生死之二途次舉草木之兩喻結以強大處下戒令必守和柔人之生也柔弱其死也堅強疏人之生也和氣流行自然以之柔弱人之死也和氣離散四肢以之堅強言此者示柔弱堅強為生死之戒萬物草木生也柔脆其死也枯稿疏此舉喻也萬物草木氣聚而生故枝葉敷榮而柔脆氣竭而死則條干變衰而枯稿前明有識此舉無情者以氣聚散為榮枯有識者以道存亡為生死故堅強者死之徒柔弱者生之徒疏此結前義也言草木生則柔脆死則堅強則知人之為堅強之行者是入死之徒為柔弱之行者是出生之類是以兵強則不勝疏此下轉結前義也用兵有言以慈為主故云兵恃強則敗欲明人恃強則死爾木強則共疏木本強大故處於下枝條柔弱共生於上蓋取其柔弱者處上強梁者在下故下文云強大處下柔弱處上疏總結上文木根本強大則枝葉共生其上之義欲明強梁之人常在柔弱之下爾天之道章第七十七前章明有為則心欲是喪和氣之柔此章明強梁必招損故示天道之喻初一句標天以申戒次五句舉喻以明天又八句總合前義以下舉聖德以結勸爾天之道其猶張弓乎疏此法喻雙舉也夫天道玄遠非喻不明故舉張弓以昭天德張弓之法具如下文高者抑之下者舉之有餘者損之不足者與之疏夫張弓之為用當合材定體令弛張調利高者抑之下者舉之為架前之時準的也有餘者損之不足者與之為發矢之時遠近也如此則能命中矣天道亦然日月寒暑一往一來來則損其有餘往者與其不足則成歲功矣人君者當法於天道抑強扶弱損有利無故舉虧盈益謙欲令稱物平施爾天之道損有餘補不足人之道則不然損不足以奉有餘疏此明人道不能同天損益注云衰多益寡者易謙卦之辭也孰能以有餘奉天下惟有道者疏孰誰也老君疾時不能同天道下濟以恤於人光大其德故舉天道以勸云誰能同天之道損其有餘以賙奉不足者乎唯有道之君乃能然爾是以聖人為而不恃疏此引聖人以證上有道之義恃猶矜恃也聖人法天平施德被於物不見其功故云不恃功成而不處疏聖人知功成而處天必損之故雖道治寰區功濟天下歸美名於群材而不處其功績爾其不欲見賢疏此結釋不恃不處之意也其不欲見賢者聖人雖盛德內充而嘉聲外隱所以不恃為不處功者正欲隱德晦名不欲令物見其賢能爾此亦損有餘之意也天下柔弱章第七十八前章明強梁必招損以示天道之喻此章明柔弱則受益故贊水德之能初五句標水之勝功次四句嘆莫能行者又五句證釋前義後一句轉結上文天下柔弱莫過於水而攻堅強者莫之能勝疏水之為性善下不爭動靜因時方圓隨器故舉天下之柔弱者莫過于水矣而攻堅強莫之能勝者夫水雖柔而能穴石石雖堅而不能損水若以堅攻堅則彼此而俱損以水攻石則石損而水全故知攻堅伐強無先水者故云莫之能勝其無以易之疏夫水雖至柔用攻堅強之物無能易之者豈不以其有不爭之德而無守勝之心乎理國修身亦常如此故柔勝剛弱勝強天下莫不知莫能行疏柔弱之道勝于剛強天下之人皆知此義但惑于自賢以己為尚無能行其所知故云莫能行是以聖人言受國之垢是社稷主受國不祥是謂天下王疏舉聖人之言證成上義此即能行以柔勝剛之行者垢穢辱也言人君能含受垢穢引萬方之罪在己則人仰德美而不離散社稷有奉故云是謂社稷之主也受國不祥是謂天下王者祥善也有君能謙虛用柔受國之不祥稱孤寡不穀則四海歸仁是謂天下王矣正言若反疏此一句結上文也夫受國垢濁却為社稷主受國不祥却為天下王其言乖背不同于俗故老君詳贊云是必真正之言行之而信但常俗聞之初若乖反爾和大怨章第七十九前章明柔弱則受益故贊水德之能此章明法令則生弊必為餘怨之迹初明立教和怨未足為義大是以下明有德執契其怨不生後天道下明天道無親唯善是與和大怨必有餘怨疏厥初生人身心清靜而今耽染塵境失道淪胥者情欲之所為也則知與身為怨之大者其唯情欲乎和調和也此言百姓因于情欲而生矯偽人君不能以我無為令其自化方欲設教立法制其姦詐調而和之故曰和大怨必有餘怨者既設教立法不能無迹斯迹之弊還與為怨故云必有餘怨安可以為善疏設教立法其迹生弊既有餘怨則安可為善則是繕性于俗學以求復其初者爾若能上化清靜無事無為人有淳朴之風迹無餘怨之弊方可為善矣是以聖人執左契而不責於人疏左契者心也心為陽藏與前境契合故謂之左契爾聖人立教則有迹有迹則是餘怨故執持此心使令清靜下以化人則無情欲不煩誅責自契無為矣故有德司契無德司徹疏司主也徹通也言有德之君主司心契則人將自化無德之主不能虛心而忘己唯欲作法以通人作法則弊生故為無德爾天道無親常與善人疏唯天道平施而與善不欺故司契清靜者天福其善則言無不利立法殘傷者天降以殃則孽不可逭豈非皇天無親唯德是輔者乎小國寡民章第八十前章明法令則生弊必為餘怨之迹此章明淳朴則至理自無矜徇之求初標無為之風以勸勉示人從君化則理後明家給人足無所企求也小國寡民使有什伯之器而不用疏寡少也什伍也伯長也器材器也此論淳古之代也言國小者明不求大言人少者明不求多不求大則心無貪競不求多則事必簡易簡易之道立則淳朴之風著適使有出人之材器堪為什伍伯長以統于人者亦無所用之矣使民重死而不遠徙疏徙遷移也化歸淳朴政不煩苛人懷其生所以重死敦本樂業無所外求各安其居故不遠遷移也雖有舟輿無所乘之疏舟輿之設本以通水陸濟有無既無往來則舟輿棄捨無所乘用矣莊子云至德之代山無蹊隧澤無舟梁雖有甲兵無所陳之疏甲兵所陳本以討不服御寇敵上行道德下無離異既却攻戰之事則甲兵韜戢而無所陳也使民復結繩而用之疏古者書契未興結繩紀事故繫辭云上古結繩而理後代聖人易之以書契欲明結繩之代人人淳朴文字既興是生詐偽今將使人忘情去欲歸于淳古故云使人復結繩而用之甘其食美其服疏食之甘者在于適適則所食皆甘服之美者在于當當則所服皆美苟不適當雖玉食錦衣不足稱其甘美也安其居樂其俗疏無欲故所居則安化淳故其俗可樂若逐欲無節將自不安其居政苛日煩焉得復樂其俗鄰國相望雞犬之聲相聞民至老死不相往來疏鄰國相望雞犬相聞蓋言其近人至老死不相往來者由彼此俱足無所求及故爾信言不美章第八十一上下二篇通明道德始標宗旨以開衆妙之門終結會歸將通得意之路故寄信美以彰言教論辨善以戒修行書知博以示迷誤陳不積以教忘遣假有多以暢法性結不爭以明聖人將令學者造精微於言象之中導筌蹄於理性外悟教而能忘教何必杜口於毗耶因言以明無言自可了心於柱下爾信言不美疏信言者聖教信實之言也此老君欲以自明所演言教化導衆生實為精信故與俗相違代人以為不美美言不信疏美言謂代教甘美之言也言多浮華動合于俗既非信實不可化人信言所以不美正以代教美言不信故爾善者不辨疏悟教之善在于修行行而忘之曾不執滯故不辨説也辨者不善疏但能辨説言教曾不悟了修行惑滯既多故不為善知者不博疏知了悟也博多聞也言體道了悟之人在乎精一不在多聞故莊子云博溺心也博者不知疏夫多聞則滯于言教滯教則終日言而不盡既非了悟故曰不知聖人不積疏積滯聚也聖人妙達理源深明法性悟文字虛假了言教空無所説之理既明能説之言亦遣則于彼言教一無滯積故云聖人不積爾既以與人己愈有既以與人己愈多疏既盡也言聖人雖不積滯言教然衆生發明慧心必資聖人誘導故聖人以清靜理性盡與凡愚而教導之於聖人以清淨性多明外益者悟理之性既非他有故云自性因教之益不自中來故云外益明聖人教導凡愚心彌慧解故云愈有惟斆學半理益精暢故云愈多爾天之道利而不害疏天道施生長養萬物利也無所宰割不害也此舉喻欲明聖人之道弘益爾聖人之道為而不爭疏聖人之道凡所作為而與物不爭者為聖人無所積滯與人愈有是以不爭爾唐玄宗御製道德真經疏卷之十
