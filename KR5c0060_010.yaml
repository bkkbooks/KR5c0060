front:
  text: 唐玄宗御製道德眞經䟽卷之十效十
  hash: sha256:6899c6751caa82c14fa4afe4a473af5c3fa937f434f0e0ababd0669b412a7b6d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0060_HFL_010-001a, image: hfl/0357/0357-146.png}
body:
  text: 民常不畏章第七十四前章明勇敢於有爲自成殺身之咎此章明有爲則輕死必犯司殺之誅首五句陳戒用刑次一句指明司殺後四句舉用刑代殺必有愆咎民常不畏死奈何以死懼之䟽言人不能守道清靜而放縱情欲動之死地積習生常曾無畏者人君當以清靜爲化而教導之奈何更以刑法誅殺恐懼之乎若使民常畏死而爲奇者吾得執而殺之孰敢䟽此明人君化以無爲人皆少欲各全其生常畏於死而獨有爲於奇詐不善之行者適令吾勢得執而殺之亦孰敢即殺所以不殺爲自有天網司殺之也故下文云常有司殺者殺䟽司主也天監孔明無所不察奇詐之人不得其死是有天之司殺者殺之矣夫代司殺者殺是謂代大匠斲䟽言不善之人司殺自殺人君用勢得執殺而便殺之是代司殺者殺人不得天理猶如拙夫代大匠斲木矣夫代大匠斲希有不傷其手矣䟽大匠斲木動合方圓拙夫代之必失繩纏惡得不損其材而傷其手乎天網不失神理昭明人君任刑代彼司殺惡得不害於人而喪其天和乎奈何以死懼之斯之謂也人之饑章第七十五前章明有爲則輕死必犯司殺之誅此章明厚斂則人貧是生有爲之弊初三段迭明所以爲弊夫唯下結嘆令其貴生民之饑以其上食稅之多是以饑䟽夫人國之本也若政煩賦重而人貧乏則國本斯弊弊則危矣是以下人不足由君上食用賦秔之太多是以令其饑乏爾民之難理以其上之有爲是以難理䟽蠢爾蒼生資君以理爲理之本諒在無爲故我無爲而人自化今人所以難理者由君上之有爲有爲則政煩而人擾動生大僞是以難理民之輕死以其求生之厚是以輕死䟽人之所以輕入死地喪其生者皆以其違分求生養生太厚不顧刑網以徇所求是以輕死夫唯無以生爲者是賢於貴生䟽夫生也有涯安分則足旣不可違亦不可加若營生於至當之外則惑矣故不厚其生而生全求厚生而生喪故知夫無以生爲憂者是賢勝於矜貴其生之人人之生章第七十六前章明厚斂則人貧是生有爲之弊此章明有爲則心欲故喪和氣之柔初標生死之二途次舉草木之兩喻結以强大處下戒令必守和柔人之生也柔弱其死也堅强䟽人之生也和氣流行自然以之柔弱人之死也和氣離散四肢以之堅强言此者示柔弱堅强爲生死之戒萬物草木生也柔脆其死也枯槁䟽此舉喻也萬物草木氣聚而生故枝葉敷榮而柔脆氣竭而死則條干變衰而枯槁前明有識此舉無情者以氣聚散爲榮枯有識者以道存亡爲生死故堅强者死之徒柔弱者生之徒䟽此結前義也言草木生則柔脆死則堅强則知人之爲堅强之行者是入死之徒爲柔弱之行者是出生之類是以兵强則不勝䟽此下轉結前義也用兵有言以慈爲主故云兵恃强則敗欲明人恃强則死爾木强則共䟽木本强大故處於下枝條柔弱共生於上蓋取其柔弱者處上强梁者在下故下文云强大處下柔弱處上䟽總結上文木根本强大則枝葉共生其上之義欲明强梁之人常在柔弱之下爾天之道章第七十七前章明有爲則心欲是喪和氣之柔此章明强梁必招損故示天道之喻初一句標天以申戒次五句舉喻以明天又八句總合前義以下舉聖德以結勸爾天之道其猶張弓乎䟽此法喻雙舉也夫天道玄遠非喻不明故舉張弓以昭天德張弓之法具如下文高者抑之下者舉之有餘者損之不足者與之䟽夫張弓之爲用當合材定體令弛張調利高者抑之下者舉之爲架前之時準的也有餘者損之不足者與之爲發矢之時遠近也如此則能命中矣天道亦然日月寒暑一往一來來則損其有餘往者與其不足則成歲功矣人君者當法於天道抑强扶弱損有利無故舉虧盈益謙欲令稱物平施爾天之道損有餘補不足人之道則不然損不足以奉有餘䟽此明人道不能同天損益注云衰多益寡者易謙卦之辭也孰能以有餘奉天下惟有道者䟽孰誰也老君疾時不能同天道下濟以恤於人光大其德故舉天道以勸云誰能同天之道損其有餘以賙奉不足者乎唯有道之君乃能然爾是以聖人爲而不恃䟽此引聖人以證上有道之義恃猶矜恃也聖人法天平施德被於物不見其功故云不恃功成而不處䟽聖人知功成而處天必損之故雖道治寰區功濟天下歸美名於群材而不處其功績爾其不欲見賢䟽此結釋不恃不處之意也其不欲見賢者聖人雖盛德内充而嘉聲外隱所以不恃爲不處功者正欲隱德晦名不欲令物見其賢能爾此亦損有餘之意也天下柔弱章第七十八前章明强梁必招損以示天道之喻此章明柔弱則受益故贊水德之能初五句標水之勝功次四句嘆莫能行者又五句證釋前義後一句轉結上文天下柔弱莫過於水而攻堅强者莫之能勝䟽水之爲性善下不爭動靜因時方圓隨器故舉天下之柔弱者莫過于水矣而攻堅强莫之能勝者夫水雖柔而能穴石石雖堅而不能損水若以堅攻堅則彼此而俱損以水攻石則石損而水全故知攻堅伐强無先水者故云莫之能勝其無以易之䟽夫水雖至柔用攻堅强之物無能易之者豈不以其有不爭之德而無守勝之心乎理國修身亦常如此故柔勝剛弱勝强天下莫不知莫能行䟽柔弱之道勝于剛强天下之人皆知此義但惑于自賢以己爲尚無能行其所知故云莫能行是以聖人言受國之垢是社稷主受國不祥是謂天下王䟽舉聖人之言證成上義此即能行以柔勝剛之行者垢穢辱也言人君能含受垢穢引萬方之罪在己則人仰德美而不離散社稷有奉故云是謂社稷之主也受國不祥是謂天下王者祥善也有君能謙虚用柔受國之不祥稱孤寡不穀則四海歸仁是謂天下王矣正言若反䟽此一句結上文也夫受國垢濁却爲社稷主受國不祥却爲天下王其言乖背不同于俗故老君詳贊云是必眞正之言行之而信但常俗聞之初若乖反爾和大怨章第七十九前章明柔弱則受益故贊水德之能此章明法令則生弊必爲餘怨之迹初明立教和怨未足爲義大是以下明有德執契其怨不生後天道下明天道無親唯善是與和大怨必有餘怨䟽厥初生人身心清靜而今耽染塵境失道淪胥者情欲之所爲也則知與身爲怨之大者其唯情欲乎和調和也此言百姓因于情欲而生矯僞人君不能以我無爲令其自化方欲設教立法制其奸詐調而和之故曰和大怨必有餘怨者旣設教立法不能無迹斯迹之弊還與爲怨故云必有餘怨安可以爲善䟽設教立法其迹生弊旣有餘怨則安可爲善則是繕性于俗學以求復其初者爾若能上化清靜無事無爲人有淳樸之風迹無餘怨之弊方可爲善矣是以聖人執左契而不責於人䟽左契者心也心爲陽藏與前境契合故謂之左契爾聖人立教則有迹有迹則是餘怨故執持此心使令清靜下以化人則無情欲不煩誅責自契無爲矣故有德司契無德司徹䟽司主也徹通也言有德之君主司心契則人將自化無德之主不能虚心而忘己唯欲作法以通人作法則弊生故爲無德爾天道無親常與善人䟽唯天道平施而與善不欺故司契清靜者天福其善則言無不利立法殘傷者天降以殃則孽不可逭豈非皇天無親唯德是輔者乎小國寡民章第八十前章明法令則生弊必爲餘怨之迹此章明淳樸則至理自無矜徇之求初標無爲之風以勸勉示人從君化則理後明家給人足無所企求也小國寡民使有什伯之器而不用䟽寡少也什伍也伯長也器材器也此論淳古之代也言國小者明不求大言人少者明不求多不求大則心無貪競不求多則事必簡易簡易之道立則淳樸之風著適使有出人之材器堪爲什伍伯長以統于人者亦無所用之矣使民重死而不遠徙䟽徙遷移也化歸淳樸政不煩苛人懷其生所以重死敦本樂業無所外求各安其居故不遠遷移也雖有舟輿無所乗之䟽舟輿之設本以通水陸濟有無旣無往來則舟輿棄捨無所乗用矣莊子云至德之代山無蹊隧澤無舟梁雖有甲兵無所陳之䟽甲兵所陳本以討不服御寇敵上行道德下無離異旣却攻戰之事則甲兵韜戢而無所陳也使民復結繩而用之䟽古者書契未興結繩紀事故繫辭云上古結繩而理後代聖人易之以書契欲明結繩之代人人淳樸文字旣興是生詐僞今將使人忘情去欲歸于淳古故云使人復結繩而用之甘其食美其服䟽食之甘者在于適適則所食皆甘服之美者在于當當則所服皆美苟不適當雖玉食錦衣不足稱其甘美也安其居樂其俗䟽無欲故所居則安化淳故其俗可樂若逐欲無節將自不安其居政苛日煩焉得復樂其俗鄰國相望鷄犬之聲相聞民至老死不相往來䟽鄰國相望鷄犬相聞蓋言其近人至老死不相往來者由彼此俱足無所求及故爾信言不美章第八十一上下二篇通明道德始標宗㫖以開衆妙之門終結會歸將通得意之路故寄信美以彰言教論辯善以戒修行書知博以示迷誤陳不積以教忘遣假有多以暢法性結不爭以明聖人將令學者造精微於言象之中導筌蹄於理性外悟教而能忘教何必杜口於毗耶因言以明無言自可了心於柱下爾信言不美䟽信言者聖教信實之言也此老君欲以自明所演言教化導衆生實爲精信故與俗相違代人以爲不美美言不信䟽美言謂代教甘美之言也言多浮華動合于俗旣非信實不可化人信言所以不美正以代教美言不信故爾善者不辯䟽悟教之善在于修行行而忘之曾不執滯故不辯説也辯者不善䟽但能辯説言教曾不悟了修行惑滯旣多故不爲善知者不博䟽知了悟也博多聞也言體道了悟之人在乎精一不在多聞故莊子云博溺心也博者不知䟽夫多聞則滯于言教滯教則終日言而不盡旣非了悟故曰不知聖人不積䟽積滯聚也聖人妙達理源深明法性悟文字虚假了言教空無所説之理旣明能説之言亦遣則于彼言教一無滯積故云聖人不積爾旣以與人己愈有旣以與人己愈多䟽旣盡也言聖人雖不積滯言教然衆生發明慧心必資聖人誘導故聖人以清靜理性盡與凡愚而教導之於聖人以清净性多明外益者悟理之性旣非他有故云自性因教之益不自中來故云外益明聖人教導凡愚心彌慧解故云愈有惟斅學半理益精暢故云愈多爾天之道利而不害䟽天道施生長養萬物利也無所宰割不害也此舉喻欲明聖人之道弘益爾聖人之道爲而不爭䟽聖人之道凡所作爲而與物不爭者爲聖人無所積滯與人愈有是以不爭爾唐玄宗御製道德眞經䟽卷之十
