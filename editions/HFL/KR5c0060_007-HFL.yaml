body:
  text: 聖人無常心章第四十九前章明爲道日損示修學忘遣之門此章明聖人無心表虚懷應物之用初六句標聖人無心而應物次兩句示聖人混迹而用心後兩句結百姓歸善之由明聖人均養之德爾聖人無常心以百姓心爲心䟽聖人虚忘物感斯應應必緣感感旣不一故應無常心心雖無常義存慈救百姓有不信不善之心故混同用心而以化導故云無常心矣善者吾善之䟽此應感之義也吾者聖人也善者迴向正道之心聖人奬之以進修以果其行使至夫忘善之大善爾不善者吾亦善之德善矣䟽不善者謂習染增迷信邪背道聖人亦以善道而引汲之德善者令化聖德而爲善爾信者吾信之䟽信謂聞道勤行心無疑執聖人應之以至誠贊成其善以至於深信爾不信者吾亦信之德信矣䟽不信謂强梁背教之人聖人亦以平等正信而化導之令化聖人之德捨僞而歸信也故云德信爾聖人在天下惵煤爲天下渾其心䟽此明聖人混迹用心也惵惵憂勤也聖人在宥天下統御寰區懼衆生不歸善信故惵惵者皆爲天下百姓未能信善故聖人混同於物而用其心也故云天下渾其心爾百姓皆注其耳目䟽百姓被聖德而歸善即淳化而觀風故皆傾注耳目以觀聽取則於聖人爾聖人皆孩之䟽百姓旣傾注耳目觀聽聖人聖人觀慈母之於赤子故云皆孩之又解云百姓有分别之心聖人化使從善令如嬰兒無所分别爾岀生入死章第五十前章明聖人無心混心應善信之行此章明出生入死善攝起患累之門前五句標安時處順之人次五句明探變求化之類後八句結善攝之行以示長生乆視之門出生入死䟽了悟生死不厚其生名爲出生迷執人我動之死地名爲入死此標章門也生之徒十有三䟽徒者類也此汎論衆生能安生理不自矜貴適來爲時一無封執如此之者大汎而論十中有三人爾此謂順理者少而逆理者多也死之徒十有三䟽此亦汎論安死之道不拒變化適去爲順一無驚怛如此之者亦十中有三人爾人之生動之死地十有三䟽此釋迷執之人養生失理之徒也言人雖欲修生不能了悟動往喪生之地安生之理旣失順死之道又乖如此之輩亦十中有三人爾夫何故䟽此設問衆生動之死地之由以其生生之厚䟽此正答言衆生動之死地者以其耽滯有爲溺情縱欲厚自奉養以全其生養之太厚故動之死地爾蓋聞善攝生者䟽攝衛也謂善能以道衛生之人妙觀生本本來清靜於生忘生不以情欲而滑其和唯以沖虚而養其性物莫能害故稱善攝陸行不遇兕虎入軍不被甲兵䟽不期而會曰遇按山海經兕出湘水南蒼黑色爾雅云形如野牛一角重千斤善攝生之人不起心害物所以陸行不遇於兕虎入軍不被於甲兵故虎兕甲兵亦無傷害之意爾兕無所投其角虎無所措其爪兵無所容其刃䟽前明善攝生之人内無害心所以外不遇兕虎今明設於逢遇此無傷害之心自然彼無容措之處是知忘情於物者則海上之鷗可馴而狎陸行之獸可繫而游况傷害乎故無是也夫何故䟽此問虎兕兵刃是害人之物今不投措其爪角無所容其兵刃者其故何也假問其故以曉於人爾以其無死地䟽此正答也夫見有其身者累生生之厚者死今善攝生之人照法性空悟身相假故能於生忘生不爲厚養之過無私順化故無死地可處爾旣心無死地夫何虎兕兵刃能害之乎道生之章第五十一前章明出生入死善攝超患累之門此章明道生德畜不宰有自然之貴首標妙本應感生成之美次明萬物尊貴道德之由故道生之復贊生畜之功生而不有下結嘆忘功之德道生之德畜之䟽道生之者言自然沖和之炁陶冶萬物物得以生故云道生之注云妙本動用降和炁者妙本道也至道降炁爲物根本故稱妙本德畜之者德得也畜養也謂萬物得道用而能畜養斯形則約兹畜養之處而受德名故云德畜之物形之勢成之䟽道生德畜品物流形故云物形之注云乾知坤作兆形位者易繫云乾知太始坤作成物天地爲形上下爲位斯皆道功寄乾坤以爲用也勢成者言道爲萬物作天時地利陰陽之勢而物資之以成故云勢成之是以萬物莫不尊道而貴德䟽以道德爲生畜之功故凡厥懷生莫不尊尚於道敬重於德此勸示衆生令敦本而崇道也道之尊德之貴夫莫之爵而常自然䟽夫代之尊榮者必由人君爵命然後爲尊今道之所以尊德之所以貴蓋以生成之功被物故物尊貴之非假爵命而常自然尊貴爾故道生之德畜之䟽此覆結初章道生之義也始之爲生養之爲畜長之育之䟽增進曰長撫字曰育成之熟之䟽輔相曰成成遂曰熟養之覆之䟽資給曰養蔭庇曰覆八者皆道德功用之謂所以萬物尊而貴之生而不有䟽道生萬物不見其有生之可名忘生之義結上道生之義也爲而不恃䟽德之爲養不見有物之可爲不恃其功結上德畜之之義也長而不宰䟽以道德忘生育之功故雖居萬物之長長育成熟不爲主宰責望於物言此者欲令人君法道生育而忘其功爾是謂玄德䟽此嘆忘功之德也玄者深遠不測之名大道雖能生能畜而終不恃不宰德施周普而名迹不彰豈非深遠不測之德乎天下有始章第五十二前章明道生德畜不宰有自然之貴此章明守母存子歸明無遺身之殃首標七句能生之本勸令知子守母次六句示絶欲之戒塞兑閉門後六句嘆美修證之功結成襲常之行天下有始以爲天下母䟽資炁曰始資生曰母言道德以沖和妙炁生成萬物物得以生如母之生子故云以爲天下母如母雖殊於道炁布化常一故上經云無名天地始有名萬物母言此者欲令人知源識本守母而存子也旣得其母以知其子䟽言人旣得沖和之炁茂養爲母當知其身是沖炁之子旣知其子復守其母殁身不殆䟽言人旣知身是道炁之子從沖炁而生也當守道清淨不染妄塵愛炁養神使不離散人從道生望道爲本今却歸道守母故云復守爾殁身不殆者言人能常無欲以歸道則可以終竟天年而無危殆也塞其兑閉其門終身不勤䟽此明絶欲守母之行也兑悦也謂耳目愛悦聲色鼻口愛悦香味六根各有所悦門以出入爲義言諸根色塵之所由也若塞其愛悦之視聽則禍患之門閉矣禍患之門閉則終身無有勤勞也故云終身不勤開其兑濟其事終身不救䟽此明失道之行也開其視聽之門濟其愛悦之事則禍益患增故終身不能救理也見小曰明䟽此示防患之源也惡兆將興細微必察故憂悔吝之時存乎纖介令守母之人防萌杜漸理之未亂能知此者可謂之明守柔曰强䟽守柔弱之行者處不競之地人不能加同道之用能如此者可謂之强用其光復歸其明䟽光者外照而常動明者内照而常靜由見小守柔則爲明爲强不矜明而用强故雖用光外照還歸内明此轉釋見小守柔之義使息外歸内故曰復歸其明也無遺身殃是謂襲常䟽遺與也殃咎也言用光照物於物無著還守内明不自矜耀守母存子返照本源自無殃咎是謂襲常者密用曰襲人能察微遠害守柔含明如是等行者是謂知子守母密用眞常之道也使我介然章第五十三前章明守母存子欲歸明無遺身殃此章明介然用知則行道有唯施之畏初三句明有知則乖道次兩句示道正而人邪又七句明有知之生弊後兩句嘆盜夸之非道而以爲戒爾使我介然有知行於大道唯施是畏䟽使我者老君假設之辭也介然謂耿介然有知之貌夫道非知法而伐人欲以有知行道故老君患其蔽蒙唱言之曰使我介然矜其有知欲行無爲大道於天下者有知則與道相乖而失無爲清靜之化唯所施爲將害於物甚可畏懼也大道甚夷而民好徑䟽夷平也徑邪捷之道言大道坦然平易而人好從邪徑且大道之化貴夫無爲無事則平易而代之從事不能息智於無欲將役心應務始雖好徑而求捷終則失道而焚和故云人甚好徑朝甚除䟽除理也言好徑之君不尚無爲之化但以有爲爲理雖云甚除有爲則傷巧詐故云尚賢矜智則生巧僞又解云朝廷修理峻宇雕墻故云甚除田甚蕪䟽草長曰蕪淫巧浮食則農事荒蕪旣闕嘉生之報何望如坻之積倉甚虚䟽年登則廪實農廢則倉虚自然之理也服文彩䟽青赤爲文色絲爲彩言賤質而貴文也帶利劍䟽利劍者武備也夫文德者理國之器用也武功者文德之輔助而文爲本武爲末今若專事武功是棄本而崇末也厭飲食䟽厭飫食也是庖厨之豐厚厭飫芳鮮上多玉食之資則下有凍餒之患矣財貨有餘䟽財貨謂錢帛珠玉之流也多藏厚斂有餘也末學不貪爲寳但欲多財累愚爾是謂盜夸非道也哉䟽非理而取爲盜矜其所有爲夸且頭會箕斂取於不足縱慾而費奉其有餘傲然自得以爲夸尚謂之爲盜不亦宜乎所爲如此則非吾欲行之道矣也哉者傷嘆之辭善建章第五十四前章明好徑之君若盜夸而非道此章明善建之主享不拔而長存首標以道立國修身之益次故以身下明觀身觀家之法後吾何以下結嘆慧照所知之驗云善建者不拔䟽建立也不拔不傾拔也言人君善能以道建邦立本者因百姓之不爲任兆人之自化然後陶以淳樸樹之風聲使儀形作孚樂推不厭則功業深固萬方歸德斯所謂善建者何可傾拔乎善抱者不脱䟽抱守也脱離也善以道懷抱百姓者動而悦隨何可脱離也且夫樂餌所在過客猶止况夫道德者進於此乎以之御物爲物所歸固其宜也子孫祭祀不輟䟽祭薦也繼世曰祀謂後代子孫薦禮於祖宗也輟止也注云言善世以道德匡抱之君功施於後愛其甘棠况其子孫乎而王者祖有功宗有德故周之興也始於后稷成於文武周之祭也郊祀后稷宗祀文王故雖卜代三十卜年七百毁廟之主流溢於外而后稷文王郊宗之祀不輟止也修之於身其得乃眞䟽此下明少修少證多學多得故修之身謂一身修修之家謂一家修始於一身終於天下例可知也言善立之人照了眞性眞性清靜無諸僞雜僞雜旣盡德乃眞純修之於家其德有餘䟽修道於家上和下睦移修身於家故其德有餘福也故易曰積善之家必有餘慶修之於鄉其德乃長䟽按周禮二千五百家爲鄉言一鄉修道禮義興行尊卑有序閭閈相比不黨於親一家修道德猶未廣一鄉盡修德乃長乆修之於國其德乃豐䟽修道於國俗易風移遺淳反樸不偏於所近一鄉修道猶未爲遍一國盡修乃豐厚修之於天下其德乃普䟽普遍也夫百姓歸厚在君之化修之廟堂德流海外者蓋内正其身不言而化不教而理下之應上如響應聲德無不周乃爲普也故以身觀身䟽觀者照察也注云以修身之法觀身能清靜者謂觀身實相本來清靜不染塵雜除諸有見有見旣遣知空亦空頓捨二偏迴契中道可謂清靜而契眞矣以家觀家䟽以修家之法觀家家人和穆則福善有餘以鄉觀鄉䟽用此修鄉之法觀鄉鄉人盡修其道尊卑順序道化漸廣德乃延長也以國觀國䟽以修國之法觀國國人盡修勤而且儉德乃豐盈也以天下觀天下䟽夫以天下觀天下者復何所觀哉亦但觀身爾人君清靜無爲道化善建善抱自然百姓胥附國祚人安矣吾何以知天下之然哉以此䟽此假設之辭也老君言我何以知天下善建則不拔善抱則不脱福德弘益之然乎蓋以此觀身等觀而觀之自我刑範由内及外則知之爾易曰觀我生觀其生將欲自觀而觀人也含德章第五十五前章明善建之主享不拔而長存此章明含德之人獨知和而不害首五句標含德所以不摶次骨弱下五句明全和所以不嗄知和則明了使氣則强梁物壯下申勸强梁之人欲令不爲是行含德之厚比於赤子䟽含懷也言至人含懷道德之深厚者内爲道德之所保外爲神明之所護比若慈母於赤子也此理難曉故借喻以明之故寄赤子之生和以况至人之全德赤子嬰兒之小者取其内無分别不生害物之心爾毒蟲不螫猛獸不據玃鳥不搏䟽此釋至人之全德也毒蟲蜂蠆之屬猛獸虎兕之屬玃鳥鷹鸇之屬螫謂以尾端行毒據按也謂以足據按物也搏持也謂以爪搏持物也言至人德全於内和氣沖盈心冥乎道故有毒蟲不能螫猛毅之獸不能據鷙玃之鳥不能搏蓋以其至順德厚之所致也骨弱筋柔而握固䟽此下明赤子全和也赤子筋骨柔弱持握不當牢固令拳手執物能自固者豈非和氣不散之所致也未知牝牡之合而䘒作精之至䟽雌曰牝雄曰牡䘒者氣命之源也言赤子心無情欲未辨陰陽之配合而含氣之源動作者豈不由精氣純粹之所致乎終日號而不嗄和之至䟽嗄聲嘶破也赤子竟日啼號而聲不嘶破者豈不由和氣至純之所致乎知和曰常䟽此結赤子以和氣至純而聲不破因之以及教言人能如嬰兒知和柔之理修而不失者是謂知眞常之行也知常曰明䟽人能知眞常之行而保精愛氣者是曰明達了悟之人知和知常嘆同德之美後益生使氣舉失道之過益生曰祥䟽祥者吉凶之兆言人不能全和於知常而營生於分外殊不知分外求益然於滋多則求益生過分是凶祥也故莊子云常因自然而不益生心使氣曰强䟽夫心有是非而氣無分别故任氣則柔弱使心則强梁今失道益生之人役心使氣氣爲心使是曰强梁故莊子云無聽之以心而聽之以氣物壯則老是謂不道不道早已䟽此明强梁失道之過壯者剛毅也老者衰憊也夫物盛必衰壯極則老夫用心使氣矜其强壯者自致衰老謂之不道道貴柔弱今恃强壯旣與道不同故勸令早已知者不言章第五十六前章明含德之人獨知和而不害此章明悟道之士能了言而無執首兩句示理暢而言忘次七句明靜塵而不染是謂下明不染者與玄同德故不可下明同德則不可毁譽知者不言言者不知䟽知者了悟也言者辯説也夫至理精微玄宗隱奥雖假言以詮理終理契而言忘故了悟者得理而忘言辯説者滯言而不悟故曰知者不言言者不知塞其兑閉其門䟽且如天下有始章所釋彼則約道清靜以塞六根愛説此則因教辨忘將息滯言之累於言無執故云塞其兑不爲榮辱之主可謂閉其門挫其鋭解其紛和其光同其塵䟽此四句已出上經道沖章彼則就道以論功此則據人以明行上下兩經互舉其文者以其於濟物修身之義有功故望言之是謂玄同䟽嘆夫體道之人旣已不滯言教又能和光混迹行符於道是謂與玄同德故不可得而親不可得而䟽䟽言玄同之人心無偏私不可得親而狎之和光順物不可得䟽而遠之不可得而利不可得而害䟽恬淡無欲不可得從而利之處不競之地故不可得犯而害之不可得而貴不可得而賤䟽體道自然非爵禄所得貴也超然絶累非凡俗所得賤也故爲天下貴䟽玄同之士悟理忘言塞兑閉門根塵無染鋭紛旣解光塵亦同其行如此故爲天下之所尊貴也唐玄宗御製道徳眞經䟽卷之七
