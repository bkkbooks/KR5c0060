front:
  text: 唐玄宗御製道德眞經䟽卷之二效二
  hash: sha256:531845d1501dbdb37577f3556ae5fd688f023631b20308b5b95d36e5d7f0e040
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0060_HFL_002-001a, image: hfl/0356/0356-052.png}
body:
  text: 三十輻章第十一前章明養神愛氣不雜則無疵此章明利有用無相資而功立故乾坤爲太易之藴轅厢成用無之質標車器以爲喻存利用以結成三十輻共一轂當其無有車之用䟽輻三十貫於一轂明少者多之所宗也當其空無方有車之運用明無者有之所利也夫道者何至無至一者也故能鼓動衆類磅礴群材適使萬殊區分成之者一象衆竅互作鼓之者一響則原天下之動用本天下之生成未始離於至一者也且就車而輪則轅厢有也車中空無也車中空無乃可運用若無轅厢之有則空無之運用息矣車中若不空無則轅厢之類皆爲棄物故乾坤成列而易功著萬化流動而道用彰是以借粗有之用無明至無之利有爾埏埴以爲器當其無有器之用䟽埏和也埴粘土也注云陶匠者尚書云範土曰陶匠範和粘土燒成瓦器亦取其中空虚以用成受物也鑿户牖以爲室當其無有室之用䟽鑿穿也門傍窗謂之牖古者穴居故詩云陶復陶穴謂穿鑿穴中之土以覆其上故云鑿爾後代聖人易之以宫室取其室中空虚所以人得居處莊子曰室無空虚則婦姑勃蹊謂爭路也爾雅云宫謂之室故有之以爲利無之以爲用䟽有之所利利於用用必資無故有以無爲利也無之所用用於體體必資有故無以有爲利注云形而上者曰道形而下者曰器易繫辭文也自無則稱道涉有則稱器欲明道用必約形器故首唯喻於三翻終欲用無於一致爾五色章第十二前章明利有用無相資故功立此章明染塵逐境馳騁則發狂首標色聲戒傷當所以爲病次云畋獵明逐欲所以焚和結以聖人去取示全眞保性之要爾五色令人目盲五音令人耳聾五味令人口爽䟽色謂青黄赤白黑音謂宫商角徵羽味謂酸鹹甘苦辛爽差也目視色耳聽聲口察味傷當過分則不能無損故坐令形骸聾盲爽差失味爾又况耽滯世間聲色諸法不悟聲色性空豈惟形骸之有聾盲此亦智之聾盲者爾馳騁畋獵令人心發狂䟽此言耽聲滯色之人馳騁欲心亦如畋獵但求殺獲欲心奔盛逐境如馳靜而觀之是心發狂病也難得之貨令人行妨䟽難得之貨者言人身以材器爲貨難得之貨者則性分所無求不可得云不安本分矯性妄求旣其乖失天然所以妨傷道行是以聖人爲腹不爲目䟽腹者含受而無分别目者妄視滯於色塵無分别則全和故爲之滯色塵則傷性故不爲也故去彼取此䟽彼目妄視故去之此腹含受故取之寵辱章第十三前章明染逐塵境馳騁則發狂此章明寵辱若驚貴身故爲患首兩句標宗以起問次十句因問以明理後四句貴愛不矜假寄託以結成寵辱若驚䟽若如也言寵辱之驚相如也夫操之則寵捨之則辱言人不能心齊榮辱矜徇功名執權旣以爲光寵失勢自傷於卑辱光寵則矜恃卑辱則驚嗟故陳戒使其若驚欲令齊其寵辱貴大患若身䟽貴矜貴也若亦如也身者禍患之源夫耽玩聲色矜競榮華皆爲有身遂成患本即貴其身者復何異乎貴大患矣即身本是患等無有異未能無患秪爲有身即此貴身同貴大患若能無患亦復亡身是知患由貴生身由患有故云貴大患若身何謂寵辱寵爲下䟽前標寵辱若驚恐人不曉故設問云何謂寵辱還自答云寵爲下所以明寵爲下者夫恃寵則驕盈驕盈則生禍因寵獲禍則寵爲辱本故知寵爲下得之若驚失之若驚是謂寵辱若驚䟽得則爲寵失則爲辱若驚者故寵辱循環故寵爲辱本世間衆生得寵則欣喜得辱則驚懼故聖人戒之禍福循環譬之糾纏寵辱無定豈可獨驚辱來旣驚其禍患寵至亦驚其驕逸其驚相若故云是謂寵辱若驚何謂貴大患若身䟽恐人不曉設問以明吾所以有大患者爲吾有身䟽吾所以有大患者爲吾執有身相好榮惡辱辯是與非不得則大憂以懼心神内竭於貪欲形骸外因於奔競薾然疲役非患而何及吾無身吾有何患䟽無身者謂能體了身相虚幻本非眞實即當坐忘遺照隳體黜聰同大通之無主均委和之非我自然榮辱之途泯愛惡之心息所謂帝之懸解復何計於大患乎故云及吾無身吾有何患注云委和者莊子丞答舜云身非汝有是天地之委和故貴以身爲天下者若可寄天下愛以身爲天下者若可託天下䟽言人君有自矜貴其身以爲天下之主者貴身則凌人人故不附可暫寄爾若自愛其身以爲天下之主者愛身則慈人人則樂推故可託身於萬人之上長爲之主然此章首標驚寵辱終以寄託者欲明驚寵辱不若忘寵辱有貴愛不若忘貴愛託天下不若忘天下故又有大患爲吾有身驚寵辱未能物我都忘則百慮一致矜有則萬殊爭長故忘寵辱則無所復驚忘身則無爲患本忘天下則無寄託之迹然後上有太上之君下有下知之臣無爲無不爲不德而有德矣視之不見章第十四前章明貴身爲患令兼忘而不有此章明妙本無象故在用而皆通首三句言不可求之聲色次六句明尋責必歸於無物又五句示妙用之難測後四句結引古以證今視之不見名曰夷聽之不聞名曰希摶之不得名曰微䟽此明道也夫視之者以色求道聽之者以聲求道摶之者以形求道道非色聲形法故求竟不得以不得故欲謂之無乃於無色之中能應衆色無聲之中能和衆聲無形之中能狀衆形是無色之色無聲之聲無形之形故謂之希微夷希微夷者謂明道而非道也夷平易也希者聲之微妙也摶執持也此三者不可致詰故混而爲一䟽三者夷也希也微也致得也詰責也混同也妙本微妙精一難名色聲形法焉得詰責欲以色聲形詰但得希微爾謂三也三者假名欲明道用道非色聲形等則混爲一矣其上不皦其下不昧䟽皦明也昩暗也夫形質之物皆有定方在上者則明在下者則暗唯妙本惚恍不可定名則在上亦不明在下亦不昩而能上能下能明能暗非天下之至賾其孰能與於此乎繩繩不可名復歸於無物䟽繩繩者運動不絶之意也妙本生化運動無窮生物之功强名不得物物而不物生生而不生尋責則妙本湛然未曾有物故云復歸於無物也是謂無狀之狀無物之象是謂惚恍䟽狀形狀也象物象也言妙本混成本無形質而萬化資禀品物流形斯可謂有無狀之形狀有無物之物象不可名之爲有亦不可格之於無無有難名故謂之惚恍迎之不見其首隨之不見其後䟽至精無形至大不可圍故迎之者不見其首隨之者不見其後無首則無始無後即無終無始無終故非隨迎所得也執古之道以御今之有䟽此明古先帝王常以無爲道化以化於人故戒今能執守古之所行無爲之教以御理今之有爲之事則不言而化矣能知古始是謂道紀䟽前云執古之道將引之使行此云能知古始明道行必化故重云帝王能知古始無爲而理當抱守淳樸爰清爰靜者是知無爲之理是道之綱紀也古之善爲士章第十五前章明妙本無象則在用而皆通此章明玄通之人常不盈而能弊首標古之五句明善爲所以微妙次云豫若七句示德容所以難明孰能下兩句表進修之徐生保此下終篇結證成而不滯古之善爲士者微妙玄通深不可識䟽古昔也士事也言古昔之人善以道事者精微要妙玄寂通達體道了言渙然無滯而其宇量深邃不可識知夫惟不可識故强爲之容䟽夫惟善士雖正容可以悟物而宇泰發於天光德量難窺故强爲容狀且求委順之迹將以引化凡愚豫兮若冬涉川䟽豫閑豫也若如也川喻代間愛欲所以陷溺衆生善士雖處代間不爲愛欲所染如冬涉川故多閑豫冬涉川所以閑豫者冬冰堅壯無墜陷之憂爾猶若畏四鄰䟽猶豫疑難也夫善士無愛欲故多閑豫及觀其行事舉動施爲恐不合道故多疑難如今之人有事畏四鄰知而加戒愼儼若客渙若冰將釋䟽善士於愛欲無所造作如客對主人但儼然肅敬爾雖於愛欲如客對主人而爲善之行不凝滯於物渙然若春冰之散釋無留礙爾敦兮其若樸䟽敦敦厚也樸質樸也言雖不凝滯於物而絶浮競其德行敦厚若質樸無所分别曠兮其若谷䟽曠寬也言善士懷道抱德宇量曠然寬大於物悉能含受如彼虚谷無不包容渾兮其若濁䟽善士心照清靜而能容物和同光塵不自殊異渾然如濁物莫能知孰能濁以靜之徐清䟽因上文云若濁便舉水之澄清以况善士之心無染則自然靜止故云孰能於代間愛欲混濁之中而以清靜道性而靜止之令愛欲不起亦如水濁而澄靜之令徐徐自清乎孰誰也孰能安以乆動之徐生䟽此教於法無滯也誰能以清靜之性靜止愛欲如水之性已得徐清若便安於此清而乆滯滯則非悟未名了出當須更求勝法運動增修爲道旣損之而又損按行亦次來而次滅則清靜之性不滯於法而徐動出也生猶動出爾保此道者不欲盈䟽滯法安清是名盈滿故云若欲保全此徐清徐生之道當須無所染著得無所得令復滯清求生是傷盈滿則妨道行故云不欲夫惟不盈故能弊不新成䟽夫能無所凝滯以至無爲於法無住不盈滿者常以新證之法爲弊薄更求勝致不以爲新成而便滯著矣致虚極章第十六前章明玄通之士常保道而不盈此章明守靜之人必歸根而復命復命爲知常之要守靜是致虚之由文相次以轉明理同歸於道用故知常則明了行道乃乆長致虚極守靜篤䟽虚極者妙本也言人受生皆禀虚極妙本是謂眞性及受形之後六根愛染五欲奔馳則眞性離散失妙本矣今欲令虚極妙本必自致於身者當須守此雌靜篤厚性情而絶欲無爲無狹而不厭則虚極妙本自致於身亦由水之流濕火之就燥矣致者令必自來如春秋致師之義爾萬物并作吾以觀其復䟽此明守靜篤必致虚極之意夫萬物萬形動作不同及觀其歸復常在於本易曰雷在地中復復者反本之謂也故靜則歸復動則失本也夫物芸芸各復歸其根䟽此舉喻明觀復之意也根者本所受氣而生也今觀萬物花葉芸芸及其生性皆復歸於其根而更生虚極妙本人所禀而生也今觀情欲熙熙能守靜致虚則正性歸復命元而長乆矣本作云云者如注釋之歸根曰靜靜曰復命䟽物歸根則安靜人守靜則致虚木之禀生者根歸根故復命人之禀生者妙本今能守靜致虚可謂歸復所禀之性命也復命曰常知常曰明不知常妄作凶䟽能守雌靜篤厚以致虚極妙本致虚則復命可謂得常矣能知守常是曰明了失常妄作可謂無常不常其德窮凶必矣注云不恒其德或承之羞者易恒卦文也知常容䟽知常曰明明則鑒物物來必應無不含容故曰知常容容乃公公乃王䟽能含容應物乃公正無私無私則天下歸往是謂王矣王乃天天乃道䟽惟天爲大唯王則之其德同天而無不覆故云王乃天王德如天則無爲而理道化乃行故云乃道道乃乆殁身不殆䟽言守靜致虚歸根復命其德如此可以爲王王德合天能行其道道行則乆享福祚天下之人就之如日戴之如天澤之如雨望之如春則終殁其身復何危殆之事故云殁身不殆太上下知章第十七此章上論淳古之風下逮澆漓之俗欲明失道之漸將辯致弊之由故前章明守靜則致虚此章示無爲則復樸樸散則親譽遂作無爲則謂我自然庶夫道化之君專此不言之教太上下知有之䟽大上者淳古之君也謂爲太上者尊之也言太上之君處無爲之事行不言之教臣下但知上有君尊之如天大而在上被四時生育之美不知何以稱其德故云下知有之其次親之譽之䟽太上之君殁黄帝堯舜氏作施教行善仁及百姓故親之柔弱致平功高天下故譽之親譽生前人之迹矯徇爲後代之患故莊子曰吾語汝大亂之本必生堯舜之間何也以其迹存乎千載之後故爾其次畏之侮之䟽黄帝堯舜氏殁下及三王五霸浸以凌遲嚴刑峻制故畏之明不能察故侮之下議罪而求功上賞奸而生詐相蒙若此可謂寒心信不足有不信䟽此復釋畏之也百姓畏君之刑法侮君之教令者皆爲君信不足於下故令下有此不信之人爾猶其貴言䟽此復釋親之譽之也百姓所以親愛君之善行稱譽君之功業者由君有德教之言故貴重君言而稱譽之爾古猶字與由通用功成事遂百姓皆謂我自然䟽此復釋太上下知也夫淳樸不殘孰爲犧樽道德公行親譽焉設故太上之世下忘帝力適令功成事遂百姓皆以爲自然合爾不知所以親譽報施也大道廢章第十八前章明步驟殊時道存故淳樸不散此章明風俗頽弊失道則仁義遂行秃施髢而病求醫雖云由愈數米炊而簡髮櫛何其傷性故直舉八句將以明其極弊冀還返於淳古也大道廢有仁義䟽大道廢者代俗澆漓人人浮競玄晏之風斯泯穆清之化不存失至道無爲之事故云廢也廢則有兼愛之仁裁非之義踧𨇨於其間矣故莊子曰道隱於小成小成謂仁義等各自其成不能大通故謂之小成爾智慧出有大僞䟽智慧出者謂後代之人役用智慧立法以檢俗制典以詰奸恐其不信作符璽以信之恐其不平爲斗斛以量之而不仁之人兼盜符璽并竊斗斛則夫智慧之作法適足侈大其詐僞故云有大僞矣六親不和有孝慈䟽六親者父子兄弟夫婦也夫大同之俗無自私之親及乎上下不和怨恩私起則有扇枕温席人謂之孝出復入顧人謂之慈被慈孝之名有自矜之色殊不知大道之代天下爲家上承下綏自然之分足視人猶己不獨親其親則天下之人皆可孝也人亦視之猶己不獨子其子則天下之人皆可慈也則孝慈之名復何所施乎國家昏亂有忠臣䟽忠者人臣之職分而云有忠臣者何由人主失御臣之道令佞主之人獲進親君於昏暗使生禍亂則有見危致命蒙死難以匡社稷而獲忠臣之名若夫道化大行無爲清靜聖皇多士盡是夔龍彝倫攸序無非作乂然後忠孝之名息淳樸之道興則於忠臣孝子何有此四者頽弊之極也焉得不返之於淳樸乎唐玄宗御製道德眞經䟽卷之二
