  - {type: page-break, offset: 0, content: '', id: KR5c0060_HFL_005-001a, image: hfl/0356/0356-166.png}
body:
  text: 執大象章第三十五前章明道可左右則物被愛養之功此章明王能用道則人歸平泰之化首標執象以明歸往之義次云樂餌舉喻歸往之由道之出口下申明無爲不言之教以勸人君之用道爾執大象天下往䟽執持也大象道也此言人君執持大道以理天下無爲無事物遂其生候日觀風皆歸有道故云天下往往而不害安平泰䟽言天下四方之人慕化而往帝王以道撫綏而不傷害之則安於太平矣平者言政教之和平也太者功業之光大也樂與餌過客止䟽樂音樂也餌飲食也此舉喻也言人君執大象而天下之人歸往亦如人家有音樂飲食則行過之客皆爲之留止道之出口淡乎其無味䟽道之出口者言人君約道德清淨之法以爲不言無爲之教者初出於口淡然無味豈如俗中有親譽畏侮等以爲滋味乎道之不足見聽之不足聞用之不可旣䟽旣盡也道化無爲淡然平正旣不爲察察之苛酷亦無滋彰之法令故視不足見聽不足聞而歳計有余淳風和暢動植咸遂其物光亨故用不可盡也將欲歙之章第三十六前章明能行道化人人所歸往此章明道或用權國之利器歸往則歸於平泰利器則不可示人初標歙張之權次示柔弱之行終結淵魚之喻以明權道之微將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之䟽歙斂也此明聖人用權道以攝化衆生也夫人旣有鈍根利根故教有權有實聖人欲量衆生根性故以權實覆却相明利根衆生見善則遷有過則改略示方便則深達根源鈍根衆生惑滯滋乆自非以權攝化不可令其歸往故將歙斂其情欲者則先開張極其侈心令自困於愛欲即當自歙斂矣强弱等義亦復如是推而行之無不信矣乍聞斯語以爲非道德之意深達玄極然後明權實之由故注云君子行權貴於合義小人用之以爲詐譎下文又云不可示人者正以權道之難故爾是謂微明䟽權道攝化其理其微而校其所由效則明著故云是謂微明柔弱勝剛强䟽易云巽以行權欲明巽順謙卑則可以行於權道故欲歙先與之張欲弱先與之强而卒令其歙弱者是柔弱之道能制勝於剛强也故云柔弱勝剛强魚不可脱於淵國之利器不可以示人䟽脱失也利器權道也夫魚之在水猶人主秉權魚失水則爲人所擒權道假示非其人則爲小人所竊弄而爲詐譎矣道常無爲章第三十七前章明道或用權示以歙張之術此章明權必合義將鎭無名之樸故道常無爲侯王守之而自化樸不欲天下以靜而自清老君因言以明無言説教而欲遺教故演暢此章於上經之末將寄兼忘於玄悟之人爾道常無爲而無不爲䟽道性清淨妙本湛然故常無爲也萬物恃賴而生成有感而必應故無不爲也夫有爲者則有所不爲也故無爲者則無所不爲也侯王若能守萬物將自化䟽侯王若能守道清淨無爲無事則萬物將自感化君之善教而淳樸矣化而欲作吾將鎭之以無名之樸䟽無名之樸道也欲作者欲動作有爲也吾者王侯自稱也言人禀承善教以化君德無爲清靜矣而復欲動作有爲者吾則將以無名之樸而鎭靜之令其清靜不欲動作也無名之樸亦將不欲䟽上言凡人欲動作有爲人君則將無名之樸而鎭靜之今言於彼無名之樸亦將不欲者若執無名還將有迹令此衆生尋迹喪本復入有爲則與彼欲心等無差别故初用無名之樸以鎭靜蒼生欲心蒼生欲心旣除聖人無名亦捨喻如藥以理病病愈而忘藥舟以濟水水濟而遺舟若水已濟而仍守舟病已除而復嘗藥豈唯不達彼岸亦復更生患累矣不欲以靜天下將自正䟽夫無名之樸旣將不欲不欲之欲於此亦忘則泊然清靜是名了出君無爲而上理人遂性而下化不煩教令而天下自正平故云天下將自正也上德不德章第三十八此章首標道用之名將明德全之化德全則淳樸不散代無濡沫之迹道廢則仁義遂行俗有澆漓之弊將欲變而更化以令求復其初故先述上德之無爲次述仁義之流遁結以去華居實使其復樸還淳上德不德是以有德䟽上者舉時也德者辯用也謂上古淳樸無爲而理體道之主任物自然是上古之淳德故云上德至德潜運人無能名故云不德而淳風和暢物遂生成德用常全故云有德注云物得以生之謂德者莊子雜篇之文下德不失德是以無德䟽此言淳風漸散德亦下衰故聖人美無爲之風而百姓尚無爲之迹尚迹爲劣故云下德迹著則有德可稱故云不失稱德不失則迹涉矜有矜有之弊淳樸不全故云是以無德上德無爲而無以爲䟽此覆釋上德也夫上德潜運無爲而理淳樸不散故無名迹今言上德無爲者但含孕淳樸適自無爲非知無爲之美而爲此無爲故云而無以爲豈惟無迹可矜抑亦無心自化故注云此心迹俱無爲矣下德爲之而有以爲䟽此覆釋下德也下德爲之者爲心美無爲之化而爲此無爲故云爲之語心雖欲無爲論迹即涉矜有故云而有以爲言下德之爲有所以爲也故注云心無爲而迹有爲爾上仁爲之而無以爲䟽此下明道廢則仁義遂行言上仁者謂以仁爲上他皆效此仁者兼愛之名大道之行物無私惠淳風漸散兼愛遂存今明所以爲兼愛之仁故云上仁爲之行仁而忘仁雖有施而不求報兼愛則難遍終是小惠未孚是以語心常爲有事故云爲之論迹即近無爲故云而無以爲注云此則心有爲而迹無爲也上義爲之而有以爲䟽義者宜也謂裁制斷割令物得宜夫淳樸已殘是非斯起將欲裁非就是令得所宜故云上義爲之謂心欲裁非就是有所以而爲故云而有以爲注云此則心迹俱有爲也上禮爲之而莫之應則攘臂而仍之䟽禮履也謂可履而行之也莊子曰以禮爲翼所以行於世也失制禮者所以救衰弊也故禮經三百威儀三千曲爲之防而事爲之制淳源一失衆務爭馳且存檢外之迹非曰由中之數故揖讓崇其禮文玉帛昭其報施往而不來非禮來而不往亦非禮今上禮爲之往而莫應則攘臂而怒以相仍之故云攘臂以仍之故失道而後德失德而後仁失仁而後義失義而後禮䟽此却明致弊之由也失道者夫上德也上德合道故云失道爾上經云大道廢有仁義莊子曰道隱於小成道無不存而此云失者約人而言爾故時淳則大道公行俗澆則小成遂作小成作而大道隱仁義行而至德衰此則世俗澆漓之殊聖人適時之務淳樸漸散則失道而後德德又下衰則失德而後仁兼愛迹存則失仁而後義裁非不足則失義而後禮且論禮於淳樸之世非狂則悖忘禮於澆漓之旦非愚則誣是故聖人救世之心未嘗有異而夷險之迹不得一爾夫禮者忠信之薄而亂之首也䟽夫者發語之端也言末代聖人行於禮教者由救忠信之衰薄爾若使人懷忠信復奚假於禮法乎而亂之首者以禮防亂則但可爲治亂之首爾而非道德之化也前識者道之華而愚之始䟽前識者制禮之人也謂之前識者言在人性識之前而制此檢外之禮道順人性禮存外迹以之比道乖失質素所以爲道之華也而愚之始者夫禮以靜亂因亂救之貴在協和歸乎淳樸而世之行禮者不務由衷之性唯務形外之飾敬愛不足幣帛有餘非達觀所存誠爲愚者之首故云而愚之始也是以大丈夫處其厚不處其薄居其實不居其華䟽大丈夫者有道之君子即前上德之君也道德無爲謂之厚實禮義有爲謂之薄華言聖人先道德之化故云處厚處實後禮義之教故云不居華薄故去彼取此䟽彼謂禮義也此謂道德也聖人去禮義之浮華取道德之厚實故云去彼取此確論聖人百慮同歸二際俱泯豈有彼此而去取耶設教引凡論之爾昔之得一章第三十九前章明上德下禮淳漓不同故舉丈夫去取之行示物向方此章明物得道用而成履道則存矜之則喪故叙侯王謙卑之德以爲誡首昔之得一者䟽昔往古也一者沖和之氣也稱爲一者以其與物合同古今不二是謂之一故易繫辭曰一陰一陽之謂道蓋明道氣在陰與陰合一在陽與陽合一爾言昔得者將明原始要終抑末歸本故引昔得以證今得得一之數略於下文天得一以清䟽氣象之大者莫大乎乾元故先標之爲得一之首純陽之氣由得一故能穹窿廣覆資始萬物爾地得一以寧䟽形質之大者莫大乎坤儀純陰之質由得一故故能磐礴厚載資生萬物爾神得一以靈䟽神者妙萬物以爲言由得一故故能通變無方不可形詰爾谷得一以盈䟽水注川爲溪注溪爲谷言谷得一故能泉源流潤盈滿不竭爾萬物得一以生䟽物者通該動植有識無情總謂之物得沖氣故故能生成運動而不歇滅侯王得一以爲天下正䟽侯王人主也侯者五等之爵王者萬乗之主言侯王得一故能永有天下無思不服而爲天下正平也本或作貞字者貞即正也其致之䟽此總釋前義而生後文致得也言天之清澄地之寧靜神之靈變谷之盈滿物之生成侯王之正平者何以致其然耶皆得道之妙用爾此明得道之爲益下文明失道之爲損爾天無以清將恐裂䟽無以者致誠之辭以用也夫矜存者喪執得者失言天得道用以致清浮若不守道沖和而但矜用其清將恐至於破裂不成象也地無以寧將恐發䟽言地得道用而致寧靜當須忘其寧靜若矜用其寧將恐至於發泄不成形也神無以靈將恐歇䟽言神得道用而能靈變無方當須忘其精靈若矜用其靈將恐至於歇絶不能妙用也谷無以盈將恐竭䟽言萬物谷得道用而能虚受當須盈滿若矜用盈滿將恐至於枯竭不能流潤也萬物無以生將恐滅䟽言萬物得道用而能生成當須忘其生若矜而有之將恐至於死滅不爲生靈也侯王無以貴高將恐蹶䟽蹶顚僕也言侯王得道之用而能爲天下之主當須忘其尊崇謙以自牧若矜其尊貴將恐至於顚僕不能正定天下也注云聖教垂代本爲生靈雖遠舉天地之清寧而會歸侯王守雌用道也書云天生萬物唯人爲靈元后作人父母是知聖教所屬在乎一人雖始誡天地使忘清寧之功終誡侯王無矜化育之德用謙之道具如下文故貴以賤爲本高以下爲基䟽貴高斥侯王賤下謂黎庶言侯王因黎庶而得貴是知賤下爲貴高之本基也書曰人唯邦本本固則邦寧人君務謙聚人可謂固邦之本注云令樂其愷悌三化者詩云愷悌君子人之父母愷樂也悌易也言君子有樂易之德愛養於人故百姓思之如子之於母也若爲德反是則人離散矣是以侯王自謂孤寡不穀此其以賤爲本邪非乎䟽是以者結前義也侯王自謂孤寡不穀者左氏春秋云孤與二三臣悼心失國是也稱寡人者即先君以寡人爲賢之例是也又按禮無父稱孤無夫曰寡穀善也不穀猶不善也凡此三名人之所鄙而侯王以爲稱首者蓋謙以自牧不矜其尊也此其以賤爲本邪者言若此豈非以賤爲本非乎者假問之辭答云實是以賤爲本爾故致數輿無輿䟽故者仍上之辭也前明侯王因賤得貴貴無定相其理難明故借數輿以比之極輿之數竟無輿名乃是輪轅假合爲輿之名本以喻侯王數侯王之貴竟無貴名乃是賤下假借爲侯王之貴本輪轅爲輿本當存本則有輿亡本則無輿賤爲貴本當存本則有位亡本則無位言此者欲戒侯王愛養下人不棄惸獨爾不欲琭琭如玉硌硌如石䟽夫玉貴而石賤如玉者自貴也如石者自謙也侯王旣以賤爲本故不欲琭琭如玉而自尊貴當須硌硌如石以守謙卑也反者道之動章第四十前章明天地得一以戒矜執之弊此章明權實兩行將申反經之義不矜則全夫貴本合義則方可與權欲令深悟道无所以再明沖用也反者道之動䟽反以反俗爲義動是變動之名謂權道也言衆生矜執其生而失於道故聖人變動設權令反俗順道爾注云反經合義者經常也義宜也今貴以賤爲本高以下爲基有以無爲用初則乖反常情而後合順於道故謂此爲道之運動也孔子曰可與立未可與權權道反常而難曉故舉棠棣之喻言其華先反而後合以喻權道先逆而後順爾弱者道之用䟽此明實道也言人皆賤弱而貴强是知强梁雄躁者是俗之用也道以柔和而勝剛是知柔弱雌靜者是道之常用故云弱者道之用爾天下之物生於有有生於無䟽言天下有形之物莫不以形相襌故云生於有窮其有體必資於無故列子曰形動不能生形而生影無動不能生無而生有故曰虚者天地之根無者萬物之源言此者欲令衆生窮源識本而悟道爾有無旣爾權實亦然故注云實之於權猶無之生有也又云至道沖寂離於名稱謂諸法性空不相因待者言道至極之體沖虚凝寂非權亦復非實何可稱名諸法實性理中不有亦復不無事絶因待所言物生於有有生於無者皆是約代法而言爾若知數輿無輿即知數諸法無諸法豈有權實而可言相生乎悟斯理者可謂了出矣唐玄宗御製道徳眞經䟽卷之五
