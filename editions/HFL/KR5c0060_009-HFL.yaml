front:
  text: 唐玄宗御製道德眞經䟽卷之九效九
  hash: sha256:eed6623e8ffe5c72677a75012aeff2e4f91e849fe16f3af4426d3c3be0edfffc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0060_HFL_009-001a, image: hfl/0357/0357-114.png}
body:
  text: 古之善爲道章第六十五前章明思患預防標絶情去欲之行此章明好智生患示玄德大順之規初明爲道之化次辯以智之賊知此下示料簡以爲法常知下嘆用功而勸修古之善爲道者非以明民將以愚之䟽言古之人君善能用道爲化者貴夫無爲恬淡非炫耀其道明示於人將導以純和杜絶智詐令質樸如愚爾民之難治以其智多䟽人之所以難理化者正以其智太多智之太多由人君不明道以臨下是使下人役用其智而生奸詐故難理爾以智治國國之賊䟽以用也賊害也言人君任用智詐之臣使之理國智多則權謀將作謀用則情僞斯起僞起則道廢有害於國故云國之賊不以智治國國之福䟽人君不任智詐之臣但求淳德之士使坐進無爲之道行宣大樸之風交泰致和是國之福也知此兩者亦楷式䟽兩者謂用智與不用智也楷模也式法也人君知用智則爲賊不用智則爲福即當去賊而取福知此者可爲理國之楷模法式也常知楷式是謂玄德䟽玄深也妙也人君常能知此兩者爲楷模法式是謂深遠玄妙之德也玄德深矣遠矣與物反矣然後乃至大順䟽此結歎也玄德之君無爲而化不測其量深也所被無外遠也故能與萬物反歸妙本然後乃至大順於自然眞性爾江海章第六十六前章明好智生患示玄德大順之規此章明善下爲主標聖人不爭之德初舉江海之喻善下則爲王次明聖人用謙樂推而不厭後結不爭之德以示修學之門江海所以能爲百谷王者以其善下之故能爲百谷王䟽言江海所以能令百川朝宗而爲王者以其善居下流之所致也故易云地道變盈而流謙此舉喻也故地道用謙則百川委輸而歸往聖人用謙則庶人子來而不厭爾是以聖人欲上人以其言下之䟽此合喻也言聖人欲上於人則以其謙言下之夫聖人豈欲居人上而以言下之邪但聖人知滿必招損故言則謙柔名則孤寡以下於物而盛德鴻業自然爲物所推尚爾欲先人以其身後之䟽聖人亦不知先人直以撝謙後已先物物自先之爾是以聖人處上而人不重處前而人不害䟽此結前也聖人臨大寳之位居至極之尊勞身而逸人薄已而厚物在上人得以生故不以爲重處前人得以理故不以爲害是以天下樂推而不厭䟽聖人之德弘濟無私與物爲春望之如日旣不爲重爲害是以天下之人樂推崇而無厭倦也以其不爭故天下莫能與之爭䟽今天下樂推聖人而不厭者豈不以聖人言則下之身則後之以其不與物爭先故天下之人莫能與聖人爭先者天下皆謂章第六十七前章明善下爲王標聖人不爭之德此章明喻大不肖示三寳以慈之行初六句標道大所以不肖次五句示三寳勸其用慈又八句復釋以慈之利捨慈之害又四句結嘆以慈之德爾天下皆謂我道大似不肖䟽肖似也老君云天下人皆謂我道虚無廣大似無所象似故下文答之夫唯大故似不肖若肖乆矣其細也夫䟽此答不肖之所由也夫唯我道廣大迥超物表固非凡情探賾所知故得稱大若其有所象似如代間法者則失其所以爲大乆矣是微細粗淺之法與修不殊何足稱大乎也夫者語助爾我有三寳保而持之䟽此明所以似不肖者正以有此三行與俗不同故老君言我道雖大無象似然有此三寳甚可珍貴爾代人當須保持執守以修身理國爾一曰慈二曰儉三曰不敢爲天下先䟽此列三寳之數也體仁博施愛育群生慈也節用厚人不耗於物儉也爲事始和而不唱不敢爲天下先也弘益之義具如下文夫慈故能勇䟽此覆述三寳之功也凡人貪競不慈勇於果敢致有窮屈今聖人以慈爲行故勇於濟度後引證論語曰仁者必有勇儉故能廣䟽以其節儉愛費不傷財不害人故功施益廣不敢爲天下先故能成器長䟽損己益人退身進物是不敢爲天下先也故物樂推而成神器之長爾今捨其慈且勇捨其儉且廣捨其後且先死矣䟽且苟且也代情多欲動與道違捨其利物之慈苟且害人之勇捨其節用之儉苟且奢泰之廣捨其謙退之後苟且矜伐之先如此之行有違慈儉以之理國則國亡以之修身則身喪故云死矣夫慈以戰則勝以守則固䟽慈爲三寳之首故偏嘆美也夫用慈以拒戰則能全衆用慈以捍守可以安人皆不失慈故能勝固也天將救之以慈衛之䟽救助也衛護也天道福善善人則吉無不利故以慈戰者天將助之以慈守者天將護之戰勝守固始賴用慈之功救之衛之終獲孔明之助爾善爲士章第六十八前章明惟大不肖示三寳以慈之行此章明爲士不武標四善配天之極首標四善之行次嘆是謂不爭結善可以配天將明古之要道善爲士者不武䟽士事也武威武也明德之君用道爲理行慈儉而育物不威武以御人所尚以慈故云不武善戰者不怒䟽師出應敵事在慈哀蚊蚋致螫驅除而已是知善戰在乎止敵不在乎憑怒故云善戰不怒善勝敵者不爭䟽夫以慈不爭由乎尚德若用力爭勝非善勝也令柔遠能邇盡暢慈和不與敵爭敵人自伏故云善勝不爭善用人者爲之下䟽夫善用其人以言謙下人必盡力可以成功故易曰以貴下賤大得人也是謂不爭之德䟽此結上文善士者常柔而不武善戰者常慈而不怒善勝者常讓而不爭善用人者常謙而爲下夫如是者物竭其能人貴其用皆由謙下之所致豈非不爭之德乎是謂用人之力䟽夫玄默恭己謙虚下人人皆歡心思竭其力故易曰悦以使人人忘其勞是用人之力也是謂配天古之極䟽此總結上來四善之行不爭之德能行之者可以配天稱帝是古之至極要道也用兵有言章第六十九前章明善士爲行不爭故可以配天此章明用兵有言輕敵則幾忘吾寳初一句標宗以設問次六句示行以辯明後四句申戒用兵知慈哀者必勝用兵有言䟽老君疾時輕敵致禍樂戰殺人故託古以申誡所稱有言謂下句也吾不敢爲主而爲客䟽吾者用兵之人也先唱爲主後應爲客主先唱示生事而貪客後應示以慈自守欲明古者用兵常有誡令當須以慈自守不可生事而貪故云不敢爲主而爲客也不敢進寸而退尺䟽夫以道退守則善勝進兵取强則敗亡故進雖少猶傷於貪退雖多愈得謙讓今鄙其競爭則云不敢進寸尚其慈讓故云而退尺也是謂行無行䟽夫行師在乎止敵止敵貴乎不爭今爲客退尺善勝不爭雖行應敵與無行同矣攘無臂䟽攘臂所以表怒善戰不怒故若無臂可攘故曰攘無臂仍無敵䟽仍引也夫引敵欲有所爭今以不爭爲德則是無敵可引故曰仍無敵也執無兵䟽執猶持也兵者五兵戈矛之屬也夫執持兵者將欲殺敵以慈爲主自戢干戈則有兵本無殺意是則與無兵同也禍莫大於輕敵輕敵幾喪吾寳䟽幾近也喪失也寳謂慈也夫爲禍之大莫大於輕侮前敵好事交爭如此則近喪失吾慈之寳矣今且失慈以戰則敗亡以守則離散代間之禍雖非一途離散敗亡禍之大者也故抗兵相加哀者勝矣䟽抗舉也夫兩國舉兵以相加則由其君用道其將以慈矜哀於人不求多殺者獲勝矣吾言甚易知章第七十前章明用兵之言戒其輕敵此章明暢理之教示其易知易知則必有宗君輕敵則喪其慈善初標聖教易知次明迷途不曉言有宗下解釋易知之意夫唯下辯説不曉之由後嘆聖人之懷玉以勖勤行之上士爾吾言甚易知甚易行䟽老君云我所言以暢於理理暢則言忘故易知也吾所言事者事於無事事簡則無爲故易行也天下莫能知莫能行䟽此嘆衆生不能了言無言執言而滯教惑於言教故莫能知也不能悟事無事煩事而不約迷於塵事故莫能行也言有宗事有君䟽此覆釋易知易行所由宗本也君主也夫言者所以在理得理而忘言故言以不言而爲宗本事者所以在功功成而遣事故事以無事爲君主此豈不易行邪夫唯無知是以不我知䟽不我知者謂不知我也夫唯代人之惑無了悟之知封著名相不能暢理於事執事於言滯言是以不知吾教以無言無事之意又解云老君言夫唯我所知唯在無知而天下之人用知求知是以不知我也知我者希則我者貴䟽希少也則法也老君言知我忘言契理之意者至希少也若能法則我言而行之者則可尊貴矣是以聖人被褐懷玉䟽褐裘也賤者之服襲裘褐者所以蔽下之粗衣也玉者潔而潤可以比德於君子言此者欲明聖人内心慧了外狀如愚故云被褐以慧了之心故云懷玉知不知上章第七十一前章明暢理之教示其易知此章明了悟之心虚忘爲上首標迷悟有異執迷成奸夫唯下結嘆聖人了知是病故不强知知不知上不知知病䟽夫法性本空而非知法聖人悟此不有取相之知於知不著故云不知是德之上此釋悟也不知知病者言常俗之人不知知法本非眞實於此無知之理强謂有知有取著之縛所以爲行之病此辯迷也夫惟病病是以不病䟽衆生强知妄生見著而爲病惱夫惟能病强知之病於知忘知則不爲强知所病故云是以不病聖人不病以其病病是以不病䟽聖人正智圓明了悟實相於知忘知故不爲知之所病所以者何以其病凡夫有强知之病故説眞智以破之妄知之病旣除眞知之藥亦遣故云不病也人不畏威章第七十二前章明了心之智以虚忘爲上此章明迷妄之病有可畏之威初標人不畏威則禍累斯及次無狹下勸人虚心靜欲則神不厭人後舉聖行證成示其去取民不畏威則大威至䟽有威可畏謂之威夫欲惡之來起於微末積成病累爲彼大威人不能愼其細微則至於大可畏也無狹其所居䟽神所居者心也人當忘情去欲寬柔其懷使靈府閑豫神栖於心身乃存也無厭其所生䟽身所生者神也厭惡也人由神而生故謂神爲所生也神明託虚好靜人當洗心息慮神自歸之若嗜欲黷神營爲滑性則精氣散越則生忘故勸令無厭所生之神以存長乆之道夫惟不厭是以不厭䟽善貸曰道資形曰神人能愛道存神故云夫唯不厭除垢止念惟精惟一神不厭人故云是以不厭是以聖人自知不自見䟽自知者反照内省防害於微令無可畏之事不自見者不自彰見其才能炫耀於物違理失常以招患也自愛不自貴䟽聖人自保愛其身絶去嗜欲令神不厭身不自貴者不自矜貴其身凌虐於物以聚怨耳故去彼取此䟽去彼自見自貴取此自知自愛聖人得平等智了法性空理無去取開教化引凡愚寓言之爾勇於敢章第七十三前章明迷妄之病有可畏之威此章明勇敢之爲成殺身之咎初標敢與不敢利害之殊次明天道謙柔戒人勇敢後嘆天網之報以勸善士之修勇於敢則殺勇於不敢則活䟽剛决爲勇必果爲敢言强梁之人無所畏忌失於謙柔决於果敢犯上作亂者則是殺身之道也故云勇於敢則殺勇於不敢則活者人若於事靜愼斂身知退所决在於不敢强梁犯患則是活身之道故云勇於不敢則活知此兩者或利或害䟽兩者敢與不敢也言人能知勇敢則殺而有害不敢則活而有利當須勇於不敢此兩者在勇雖同所施則異故云或利或害天之所惡孰知其故䟽孰誰也故猶意故也勇敢於有爲之人動則有害乃天道之所惡而代俗之人誰能知其意故者乎是以聖人猶難之䟽此舉聖以勵凡也夫以聖人之明猶難於勇敢懼其爲害况於凡人欲爲勇敢焉得無害乎天之道不爭而善勝䟽因上言天之所惡故此下四句廣明天道謙虚以戒人事勇敢人懷勝負所以有爭天道平施唯善是與物莫之違故云善勝也不言而善應䟽天何言哉但福善禍淫吉凶咸應故曰不言而善應也不召而自來䟽凡物之來皆由命召今天不召於物而使從己而萬物自來而順之則負陰抱陽春生夏長皆非召而來也繟然而善謀䟽天道玄遠繟然寬大垂象示變人可則之故云善謀天網恢恢䟽而不失䟽恢恢寬大也此覆釋上天道等義也天道網羅雖復寬大䟽而且遠賞善罰惡不失毫分也唐玄宗御製道徳眞經䟽卷之九
