front:
  text: 唐玄宗御製道德眞經䟽卷之一
  hash: sha256:83e1283226507e196e16b3c2490d2e7b669fd737effbfe118ae1ba888434f646
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0060_SJB_001-110750a, image: sjb/11/110750a.png}
body:
  text: 道可道章第一此章明妙本之由起萬化之宗源首標虚極之强名將明衆妙之歸趨故可道可名者明體用也無名有名者明本迹也無欲有欲者明兩觀也同出異名者明樸散而爲器也同謂之玄者明成器而復樸也玄之又玄者辯兼忘也衆妙之門者示了出也所謂進修之階漸體悟之大方也道可道非常道䟽道者虚極妙本之强名訓通訓徑首一字標宗也可道者言此妙本通生萬物是萬物之由徑可稱爲道故云可道非常道者妙本生化用無定方强爲之名不可遍舉故或大或逝或遠或近是不常於一道也故云非常道名可名非常名䟽名者稱謂即物得道用之名首一字亦標宗也可名者言名生於用可與立名也非常名者在天則曰清在地則曰寧得一雖不殊約用則名異是不常於一名也故云非常名無名天地之始䟽無名者萬化未作無强名也故莊子曰太初有無無有無名但其妙本降氣開闢天地天地相資以爲本始故云無名天地之始則易之太極生兩儀也注云權輿者按爾雅云權輿始也有名萬物之母䟽有名者應用匠成有强名也萬化旣作品物生成妙本旁通以資人用由其茂養故謂之母也母以茂養爲義然則無名有名者聖人約用以明本迹之同異而道不繫於有名無名也常無欲以觀其妙常有欲以觀其徼䟽欲者性之動謂逐境而生心也言人常無欲正性清靜反照道源則觀見妙本矣若有欲逐境生心則性爲欲亂以欲觀本旣失冲和但見邊徼矣徼邊也又解云欲者思存之謂言欲有所思存而立教也常無欲者謂法清靜離於言説無所思存則見道之微妙也常有欲者謂從本起用因言立教應物遂通化成天下則見衆之所歸趨矣徼歸也此兩者同出而異名䟽此者指上事也兩者謂可道可名無名有名無欲有欲各自其兩故云兩者俱禀妙本故云自本而降隨用立名則名異矣同謂之玄䟽玄深妙也自出而論則名異是從本而降迹也自同而論則深妙是攝迹以歸本也歸本則深妙故謂之玄玄之又玄衆妙之門䟽攝迹歸本謂之深妙若住斯妙其迹復存與彼異名等無差别故寄又玄以遣玄欲令不滯於玄本迹兩忘是名無住無住則了出矣注云意因不生者西升經云同出異名色各自生意因今不生意因是同於玄妙無欲於無欲者爲生欲心故求無欲欲求無欲未離欲心今旣無有欲亦無無欲遣之又遣可謂都忘正觀若斯是爲衆妙其妙雖衆若出此門故云衆妙之門也天下皆知章第二前章明妙本生化入兩觀之不同此章明樸散異因萬殊而逐境逐境則流浪善化則歸根故首標美善妄情次示有無傾奪結以聖人之理冀達還淳之由天下皆知美之爲美斯惡己皆知善之爲善斯不善矣䟽天下者舉大凡而言凡在天覆之下也美者心所甘美也善者身所履行也言天下之人皆知以己心所甘美者爲美己身所履行者爲善故論甘則忌辛好丹則非素共相傾奪競起是非皆由興動於欲心所以遞成乎美惡聖人知美惡無主俱是妄情妄情則不常故云惡已已語助也注云神奇臭腐者莊子云所美爲神奇所惡爲臭腐故有無之相生䟽此明有無性空也夫有不自有因無而有凡俗則以爲無生有無不自無因有而無凡俗則以爲有生無故云相生而有無對法本不相生相生之名猶妄執起如美惡非自性生是皆空故聖人將欲救其迷滯是以歷言六者之惑難易之相成䟽此明難易法空也此以難而彼成易此以易而彼成難亦如工者易於木難於埴陶匠易於埴而難於木故云難易之相成若同其所難則無易同其所易則無難難易無實妄生名稱是法空故能了之者巧拙兩忘則難易名息亦如美惡無定故也長短之相形䟽此明長短相空也以長故形短以短故形長故云長短相形亦如鳧脛非短由鶴脛之長故續之則憂鶴脛非長由鳧脛之短故斷之則悲見短長相猶如美惡旣無定禮皆是妄情高下之相傾䟽此明高下名空也高下兩名互相傾奪故稱高必因於下又有高之者稱下必因於高又有下之者又高則所高非高又下則所下非下如彼世間凡諸有名位遞爲臣妾亦復無常是皆空故故無定位音聲之相和䟽此明和合空也五音相和成曲者誰總彼衆聲則能度曲如世間法皆和合成則體非眞是皆空故將欲定其美惡豈云達觀之談前後之相隨䟽此明三時念空也日月相代代故以新如彼投足孰爲前後則前後之稱由相隨立名名由妄立誰識其初過去未來及以見在三時空故念念遷故亦如美惡無定名也是以聖人處無爲之事行不言之教䟽是以者説下以明上也夫飾智詐者雖拱默非無爲也任眞素者則終日措撝而未始不晏然矣故聖人知諸法性空自無矜執則理天下者當絶浮僞任用純德百姓化之各安其分各安其分則不擾豈非無爲之事乎言出於己皆因天下之心則終身言未嘗言豈非不言之教耶萬物作而不辭䟽作猶動也辭爲辭謝也言聖人善化無事無爲百姓不知爰游爰豫各自得其動作而不辭謝於聖人故擊壤鼓腹而忘帝力此人忘聖功也生而不有爲而不恃功成而不居䟽令物各得成全其生理聖人不以爲己有令物各得其營爲聖人不恃爲己功如此太平之功弘濟日遠猶且愼終如始不敢寧居此聖人自忘其功注云日愼一日尚書文也夫惟不居是以不去䟽彼聖人者稠直如髮愼終如始本末不衰未嘗寧居而逸豫是以日新其盛德忘功而功不去光宅而天下安故云夫惟不居是以不去不尚賢章第三前章明萬殊逐境善化則歸根此章明貴尚不行無爲則至理首標不尚絶矜徇之迹次云聖理示立教之方結以無爲明化成而復樸也不尚賢使民不爭䟽尚崇貴也賢才能也言人君崇貴才能則有迹飾僞者徇迹而失眞失眞必是尚賢之由徇迹定起交爭之弊不若陶之玄化任以無爲使雲自從龍風常隨虎則唐虞在上不乏元凱之臣伊吕升朝自得台衡之望各當其分人無覬覦則不爭也不貴難得之貨使民不爲盜䟽人之受生所禀有分則所禀材器是身貨寳分外妄求求不可得故云難得夫不安性分希慕聰明且失天眞盡成私盜今使賢愚襲性可否用情旣無越分之求自輕難得之貨皆得性分誰爲盜乎故莊子曰不仁之仁竊性命之情而饕富貴又解云以人君不貴珠犀寳貝則其政清靜故百姓化之自絶貪取人各知足故不爲盜不見可欲使心不亂䟽希慕聰明是見可欲欲心興動非亂而何今旣不崇貴賢能亦不妄求越分則不見可欲之事而心不惑亂也是以聖人之治䟽聖人治國理身以爲教本夫理國者復何爲乎但理身爾故虚心實腹絶欲忘知於爲無爲則無不理矣虚其心䟽夫役心逐境則塵事汨昏靜慮全眞則情欲不作情欲不作則心虚矣莊子曰虚室生白謂心虚則純白獨生也故曰虚其心實其腹䟽腹者含受之義足則不貪欲使道德内充不生貪愛故云實其腹注云屬厭而止者春秋間没汝寬諫魏獻子辭也欲以小人之腹爲君子之心屬厭則足而不貪也弱其志䟽志者心之事事在心曰志欲令心有所行皆守柔弱故知心虚則志弱矣强其骨䟽骨者體之幹旣其道德内充常無貪取不貪則腹實腹實則自骨强矣使民無知無欲䟽聖人所以行虚心實腹之教者常欲使百姓無爭尚之知貪求之欲令其自化爾使夫知者不敢爲也䟽夫無知無欲者已清靜也則使夫有知者漸陶淳化不敢爲徇迹貪求而無爲也爲無爲則無不治矣䟽夫得其性而爲之雖爲而無爲也且絶尚賢之迹不求難得之貨人因本分物必全眞於爲無爲復何矜徇化旣無馨而無臭人故不識而不知淳風大行誰云不理道冲章第四前章明貴尚不行無爲則至理此章明妙本之用在用而無爲首標道沖示至虚之宗物次云挫解明冲用之釋紛又説和同之妙所在不雜光塵結以象帝之先欲令盡知歸趣爾道沖而用之或不盈淵兮似萬物之宗䟽沖虚也謂道以沖虚爲用也夫和氣沖虚故爲道用用生萬物物被其功論功則物疑其光大語沖則道曾不盈滿而妙本深靜常爲萬物之宗云或似者道非有法故不正言爾他皆放此挫其鋭解其紛䟽挫抑止也鋭銛利也解釋散也紛多擾也沖虚之用物莫之違故銛利之心多擾之事念道沖和自令抑止釋散矣此則約人以明道用注云俗學求復者莊子繕性篇云繕性於俗俗學以求復其初言銛利紛擾因欲而生故念道則挫解俗學則彌結矣和其光同其塵湛兮似或存䟽道之沖用於物不遺在光則與光爲一在塵則與塵爲一無所不在所在常無沖用則可混光塵妙本則湛然不雜故云似或也吾不知誰之子象帝之先䟽吾者老君自稱象似也老君云吾見至道沖用生成萬物尋責所以不測由來旣無父道之人故莫知道爲誰子生物必資於道故似在乎帝先注云帝者生物之主易云帝出乎震輔嗣云帝者生物之主興益之宗也又解云兆見曰象言此生物之帝能兆見物象故謂之象帝爾天地不仁章第五前章明妙本沖用體用而無爲此章明兼愛成私偏私則難普首標芻狗萬物示天地之兼忘次喻橐籥罔窮明用虚而不撓結以多言數屈欲令必守中和天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗䟽仁者兼愛之目也芻草也謂結草爲狗以用祭祀也莊子曰師金謂顔回曰夫芻狗之未陳巾以文繡及其已陳則蘇者取而爨之今天地至仁生成群物亦如人結草爲狗不責其吠守之功不以生成爲仁恩故云不仁也則聖人在宥天下視彼百姓亦當如此爾注云蔽蓋之恩者孔子曰蔽蓋不棄爲埋狗也不獨親其親者禮運文也天地之間其猶橐籥乎虚而不屈動而愈出䟽橐也謂以皮爲橐鼓風以吹火也籥笛也言天地能芻狗萬物者爲其間空虚故生成無私而不責望亦猶橐之鼓風笛之運吹常應求者於我無情故能虚之而不屈撓動之愈出聲氣以况人君虚心玄默淳化均一則無屈撓日用不知動而愈出也多言數窮不如守中䟽多言者多有兼愛之言也多有兼愛之言而行難遍故數窮屈不遂是知不如忘懷虚應抱守中和則自然皆足矣注云不酬者酬答也謂空有其言而行不酬答谷神不死章第六前章明兼愛成私偏私則難普此章明至虚而應其應即不窮首標谷神寄神用以明道次云玄牝辨玄功之母物結以綿綿微妙玄示虚應則不勤勞也谷神不死是謂玄牝䟽谷神者明谷之應聲似道之應物有感即應其應如神神者不測之名死以休息爲義不測之應未嘗休息故云谷神不死玄深也牝母也谷神之應深妙難名萬物由其茂養故云是謂玄牝玄牝之門是謂天地根䟽玄牝之用有感必應應由物出故謂之門天地有形之大者爾不得玄牝之用則將分裂發洩故資禀得一以爲根本故云是謂天地之根本也綿綿若存用之不勤䟽綿綿者微妙不絶之意虚牝之用應物無私微妙則稱爲若存無私故用不勤倦天長地乆章第七前章明谷神虚應虚應即不窮此章明天地無私無私故長乆首則標天地以爲喻次則舉聖人以轉明結以無私成私將欲勸勤此行天長地乆䟽此標章門也天以氣象故稱長地以形質故稱乆天地所以能長且乆者以其不自生故能長生䟽前句標問此假答云天地所以能長且乆者以其覆載萬物長育群材而皆資禀於妙本不自矜其生成之功用以是之故故能長乆又解云不自生者言天地但生養萬物不自饒益其生故能長乆是以聖人後其身而身先外其身而身存䟽是以聖人效天地之覆載必均養而無私故推先與人百姓欣賴爲下所仰故身先也不自矜貴而外薄其身天下歸仁則無畏害故身存也非以其無私邪故能成其私䟽天地所以能長乆聖人所以先存者非以其無自私之心故能成此長乆先存之私乎上善若水章第八前章明天地無私生成則長乆此章明至人善行柔弱故無尤首標若水示三能之近道次云居地書七善之利物結以不爭勸守柔而全勝也上善若水䟽上善者標人也若水者舉喻也至人虚懷於法無住忘善而善是善之上上善之行如水之能具在下文皆含法喻水善利萬物而不爭處衆人之所惡䟽水性甘凉散灑一切被其潤澤蒙利則長故云善利此一能也天下柔弱莫過於水平可取法清可鑒人乗流遇坎與之委順在人所引嘗不競爭此二能也惡居下流衆人恒趨水則就卑受濁處惡不辭此三能也故幾於道䟽幾近也利物明其弘益不爭表其柔弱處惡示其含垢此水性之三能唯至人之一貫其行如此去道不遐故云近爾居善地䟽至人所居善能弘益如水在地利物則多又地道用卑水好流下同至人之謙順幾道性之柔弱故云居善地心善淵䟽至人之心善於安靜如水之性湛爾泉渟水靜則清明心閑則了悟淵深靜也故云心善淵與善仁䟽至人弘濟常以與人善施之功合乎仁行如水潤物無心愛憎故云與善仁言善信䟽上善之人言必眞實弘化凡庶善信不欺如彼泉流豈殊坎險故云言善信注云行險而不失其信者周易坎卦辭也政善治䟽政正也至人於事動合無心正容悟物物因從正正則理非善而何如彼水性洗滌群物令其清靜故云政善治事善能䟽至人圓明於物無礙凡有運動在事皆通通則善能是名照了如彼水性决之爲川壅之爲池浮舟涵虚無所不爲是善能也動善時䟽至人之心喻彼虚谷方之鏡像物感斯應如彼水性春泮冬凝與時消息故云動善時夫惟不爭故無尤䟽尤過也至人善行與物無傷虚心曲全未曾爭競波流頽摩委順若斯旣不違逆於物故無尤過之地矣持而盈之章第九前章明至人善行柔弱故無尤此章明凡俗溺情驕盈故有咎首標持盈揣鋭示其難保次云金玉富貴戒此貪求結以名遂身退令忘功而不處也持而盈之不如其己䟽持執也盈滿也已止也言人心貪愛求取無厭執守保持使令盈滿積財爲累悔吝必生故聖人戒云不如休止揣而鋭之不可長保䟽揣量度也鋭銛利也凡情滯溺貪求榮利故揣量前事銛鋭欲心鬼瞰人怨坐招殃咎故曰不可長保也金玉滿堂莫之能守䟽假使貪求不已適令金玉滿堂象有齒而焚身鷄畏犧而斷尾且失不貪之寳坐貽致寇之憂其以賈害豈云能守此復釋持盈也富貴而驕自遺其咎䟽遺與也富則人求之故便欺物貴則人下之故好凌人驕奢至而不期殃咎來而誰與因驕獲咎驕自心生故云自遺爾此復釋揣鋭也功成名遂身退天之道䟽此舉戒也夫滿則招損謙便受益惟彼天道尚不常盈故功成者隳名遂者虧欲求長保未聞斯語當須忘功與名退身辭盛如彼天道不失盈虚則無憂責矣載營魄章第十前章明縱欲溺情驕盈故有咎此章明養神愛氣不雜則無疵營魄已下至滌除戒修身所以全德愛人己下至明白示德全可以爲君結以生之畜之表玄功之被物也載營魄抱一能無離乎䟽載初也營護也言人受生始化但有虚象魄然旣生則陽氣充滿虚魄魄能運動則謂之魂如月之魄照日則光生矣故春秋子産曰人生始化曰魄旣生魄陽爲魂言人初載虚魄當營護陽氣常使充滿則得生全若動用不恒消散陽氣則復成虚魄而死滅也莊子曰近死之心莫使復陽故令營護虚魄使復陽全生抱守淳一不令染雜無離身乎則生全矣此教養神也專氣致柔能如嬰兒乎䟽專專一也氣沖和妙氣也人之受生沖氣爲本若染雜塵境則沖氣離散神不固身故戒令專一沖和使致柔弱能如嬰兒無所耽著乎此教養氣滌除玄覽能無疵乎䟽滌洗也除理也玄覽心照也疵病也人之耽染爲起欲心當須洗滌除理使心照清淨愛欲不起能令無疵病乎此教滌心也愛民治國能無爲乎䟽愛民者使之不暴卒役之不傷性理國者務農而重穀事簡而不煩則人安其生不言而化也此無爲也能爲之乎天門開闔能爲雌乎䟽修德可以爲君爲君須承曆數即天門者帝王曆數所從出也開謂受命闔爲廢黜天降寳命以祚有道能守雌柔可享元吉故云能爲雌乎又解云易曰一闔一闢謂之變言聖人設教應變無常不以雄盛而守雌牝亦如天門開闔虧盈而益謙也明白四達能無知乎䟽帝王旣受曆數臨御萬方若能守雌靜則其德明白如日之照四達天下功被於物不以爲功所謂忘功若無知者故云能無知乎生之畜之䟽下經云道生之德畜之此云生之畜之者謂人君法道清靜令物得遂其生成效德弘濟令物各盡其畜養故云生之畜之生而不有爲而不恃長而不宰是謂玄德䟽物得遂生聖忘功用遂生則生理自足忘功則功用常全斯乃無私而成私不宰而爲眞宰也故生而不有者令物各遂其生君不以爲己有也爲而不恃者令物各得其動用而不自負恃爲己功也長而不宰者居萬民之上故云長而不恃其功故云不宰也如是是謂深玄妙之德矣唐玄宗御製道徳眞經䟽卷之一
