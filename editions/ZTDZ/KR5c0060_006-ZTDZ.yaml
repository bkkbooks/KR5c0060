front:
  text: 唐玄宗御製道德眞經䟽卷之六效六
  hash: sha256:70439c9cb13b8d5bb1697756369f1846637c4277d0803b48ed7aeca8b19a62a1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0060_SJB_006-110781b, image: sjb/11/110781b.png}
body:
  text: 上士聞道章第四十一前章明權實兩門是道之動用此章明明道若昩唯上士勤行初明三士聞道信毁不同次建言下明道德之行門後夫唯下結善貸之功用爾上士聞道勤而行之䟽上智之士深識洞鑒聞道權則微明實則柔弱聞斯行諸皆不懈怠故云勤而行之爾中士聞道若存若亡䟽中庸之士明昩未明聞説妙道或信或否謂明則若存而信奉謂昩則若亡而疑惑未果决志故曰若存若亡下士聞道大笑之䟽下士識不及理聞道不信謂爲虚誕則嗤笑之亦猶章甫致賤於越人和璞見遺於楚國故莊子云曲士不可以語於道矣不笑不足以爲道䟽至道幽玄深不可識明而若昩理反常情下士蒙愚所以致笑若不爲下士所笑未曰精微乃是淺俗之法不足以爲道非代間法故爲凡愚所笑是以爲妙道也建言有之䟽建立也將立言以釋上士勤行之道中士存亡之致下士大笑之由有之者指下明道等爾明道若昧䟽明照了也昩昏暗也謂道德行人以昩養明遺形去智而實明了故云若昩言上士勤行於明若昩下士不達是以笑之中士初聞明道故若存後聞如昩故若亡爾進道若退䟽進道之人内心不起外事都忘功名日損大成若缺下士觀之如似退敗之爾夷道若纇䟽夷平也纇絲之不匀者夫識心清靜塵欲不生坦然平易與物無際而外若絲之有纇節也上德若谷䟽言勤行之士謂之上德德用光備光備則無不含容故云若谷爾大白若辱䟽白純淨也辱塵垢也得純淨之道者晦迹同塵故稱若辱而實純白獨全備爾廣德若不足䟽言至人德無不被廣也守柔用謙故常若不足也史記曰良賈深藏若虚君子盛德容貌若愚若愚不足建德若偷䟽建立也偷盜也建立陰德之人潜修密行如被盜竊常畏人知故曰若偷質眞若渝䟽眞淳一也渝變改也言道德行人其德淳一而無假飾若可渝變與物同波而和光也大方無隅䟽方正也隅角也夫砥礪名節以作廉隅此爲求教之人非曰大方之士磨而不磷在涅而不淄大方也而能和光同塵不自殊異無隅也故曰大方無隅大器晚成䟽備物之用曰器器以晚成故能成大是以上士勤行積功而證得之於漸非一朝一夕故曰晚成大音希聲䟽夫道能應衆音大音也聽之無聲希聲也以况聖人開演一乗則法音廣被待感而應故曰希聲大象無形䟽夫涉形器者則滯於一方矣唯大象之道本無形質隨感而應能狀衆形故曰大象無形爾道隱無名䟽因其通生則强謂之道忘其功用則隱無名氏欲明名以銘體而妙本無象則體不可名故曰道隱無名夫唯道善貸且成䟽此結道之功用夫嘆也唯獨也貸施與也嘆羡此道雖復無名無氏無形無聲獨能布氣施化貸施萬物且成之熟之故曰善貸且成爾道生一章第四十二前章明三士所聞之道能生萬物此章明萬物生化之由必資三氣初明沖氣柔弱令萬物抱以爲和次云孤寡不穀戒王公以謙自處結以强梁不得其死示其修學之元爾道生一一生二二生三三生萬物䟽道者虚極之神宗一者沖和之精氣生者動出也言道動出和氣以生於物然應化之理由自未足更生陽氣積陽氣以就一故謂之二也純陽又不能更生陰氣積陰就二故謂之三生萬物者陰陽交泰沖和化醇則遍生庶彙也此明應道善貸生成之義爾萬物負陰而抱陽沖氣以爲和䟽言物之生也旣因陰陽和氣而得成全當須負荷陰氣懷抱陽氣愛養沖氣以爲柔和故廣成子告黄帝曰我守其一以抱其和故我修身千二百歲而形未嘗衰是知元氣沖和群生所賴老君舉此者明人旣禀和氣以生則氣爲生本人當因柔和守雌弱以存本也人之所惡惟孤寡不穀而王公以爲稱䟽沖氣柔弱爲生之本故舉王公謙卑以敦其本孤寡不穀不善之名非尊崇之稱人所惡之而王公以爲名者謙之志也王公爲風化之主存亡所繫天下具瞻若不崇尚謙柔以安社稷則物所不歸故謙柔爲本以致巍巍之功也故物或損之而益或益之而損䟽故者仍上之辭也損貶毁也言王公稱孤寡以自毁損則爲百姓樂推尊敬而事之而致益也或益之而損者若王公貴寵其身居上而驕則下人離散而致損也書曰滿招損謙受益斯之謂也人之所教亦我義教之䟽人謂人君爲政教之首一國之風繫乎一人而化故老君唱言曰人君欲行言教以化人者當須用我沖虚柔弱之義以教之爾强梁者不得其死䟽强梁謂剛暴屈强之人也剛暴之人失養生之要必自失其天命不得壽終而死嚴仙人曰强秦以專制而滅大漢以和順而昌强梁失道剛武者失神生主已退安得長存注云動與物亢物或擊之亢敵也物擊之者易益卦上九爻辭云莫益之或擊之爾吾將以爲教父䟽父本也此句結修學之元老君舉强梁者亡以之爲戒柔弱者全以之爲勸以爲教父者父爲子本言吾將此柔弱之教爲衆教之本如子之父故云教父爾天下之至柔章第四十三前章明衆生背道强梁所以不得其死此章示人正性柔弱修之則與道合同文殊途以發明理會歸而齊致首標舉道性柔弱之本人儻有得失之成堅强之過後吾是以下明無爲之道廣有利益衆教莫能先天下之至柔馳騁天下之至堅䟽夫人之正性本自澄清和氣在躬爲至柔也若馳騁情欲染著代塵爲聲色所誘則正性離散爲至堅也無有入無間䟽無有者謂人了悟諸法一無所有則返歸正性與道合同入無間矣無間道也入謂與道同也以道爲無間者明道性清靜混然無際而無間隙爾吾是以知無爲之有益䟽吾者老君自稱也此章亦通誡人君以無爲化理天下故老君云吾見衆生正性柔弱及乎馳騁奔競則至堅强若使照了心境則一無所有即合道矣是知清靜無爲理身理國有益於人也以法推之有爲之教不及無爲之有益也不言之教無爲之益天下希及之䟽至道無言物之以生聖人無爲化之以清即不待立言然後成教天下希及之者言九流百氏希有能及無爲之教者又云自非體道之君莫之能及故曰希之爾名與身孰親章第四十四前章明正性柔弱馳騁所以至堅此章明名貨親䟽愛藏所以爲患初三句標問得亡孰病次兩句詳答致患之由後知足下結勸令守分則可長乆爾名與身孰親䟽此以名較量身也孰誰也詳問云夫以矜徇功名保養身命兩者旣異誰可與全眞保年之道爲親乎傷代人不能忘名以存身爾身與貨孰多䟽多者可貴重之意也言身與貨兩者旣别誰可多貴邪云此者欲令悟身爲多不貴於貨可也注云擲玉毁珠者莊子外篇之辭爾得與亡孰病䟽此總問上二句得名貨與亡名貨誰爲病也得名貨則亡身存身則亡名貨歷然殊致爲病可知而迷倒之徒莫之先覺故後文詳答之爾是故甚愛必大費多藏必厚亡䟽此二句總答前問甚愛必大費者此答名與身孰親費猶損也親猶愛也甚愛名者矯企情性損費心神所愛旣甚所費彌大矣多藏必厚亡者此答身與貨孰多藏貨旣多其亡亦厚劍玉賈害譬諸懷璧詩書發塜秪爲含珠唯貨之損可爲殷鑒矣知足不辱知止不殆可以長乆䟽辱損累也殆危亡也夫不邇聲名知足也不殖財貨知止也知足故名當其實而無過分之累知止故貨不多藏而無貪求之害旣不辱不殆乃可長存而乆壽爾大成若缺章第四十五前章明身貨孰親愛藏所以爲患此章明戒盈若缺其用所以不窮次初七句標立行之楷模次兩句明靜躁之優劣後清淨下結釋清淨則可爲天下正爾大成若缺其用不弊䟽凡曰學人功行大成衆德圓備常自虚忘有如玷缺如是則材用不窮也道德大成之君亦復如是等天地生育之功齊日月照臨之德所成理大故曰大成然不恃其成有如虧缺以斯爲用用則無窮大盈若沖其用不窮䟽沖虚也窮匱也此明聖人禄位充盈恭儉自牧不爲盈滿故若沖虚所謂有若無實若虚故其運用而無窮匱大直若屈䟽直正也屈曲也前四句兼明體用此下三句但出其體不書其用略文以見義類可知也夫潔己而垢人舉直而措枉小直也不執是以辯非不正己而矯物大直也曲隨物宜故云若屈也注云直而不肆上卷道經之文也大巧若拙䟽矜粉繪之工騁鈎繩之妙小巧也因材致用任物成功不失其宜大巧也無所裁割不見其功似若樸拙爾莊子稱造化刻雕衆形而不爲巧也大辯若訥䟽合譬飾辭結繩竄句小辯也行不言之教辯雕萬物窮理盡性大辯也至言去言無所抑揚如謇訥躁勝寒靜勝熱䟽此舉喻以示教也以執成者必敗持滿者必傾故聖人功濟天下不見成功其如缺所以無弊位尊萬乗不視成位其若沖所以不窮也恐人不曉故寄陽氣動靜以喻之躁動也勝極也言春夏陽氣發於地上萬物因之以生陽氣動極則寒寒則萬物由之以衰死明躁爲死本盛爲衰源喻功成不缺者必敗持盈不沖者必傾有爲剛躁者必死靜勝熱者謂秋冬陽炁靜於黄泉之下靜極則熱熱則和氣發生也萬物因之以生生託靜而起故知靜爲生本亦爲躁君取喻大成大滿由能缺能沖所以無弊無窮而致生爾夫能無爲清靜者則趣生之本此勸人當務靜以祈生不當輕躁而赴死爾清靜爲天下正䟽此結明前義也夫聖人有以觀陽炁之進退知躁爲趣死之源靜爲發生之本理人事育群生持本以統末務清淨之道則可以爲天下之正爾天下有道章第四十六前章明五大之行用廣修學之門此章明三大之愆以彰可欲之弊初標有道無道之損益次明爲罪爲咎之所由後結知足之爲德以戒貪求之生患爾天下有道却走馬以糞䟽却屏去也糞謂理田也天下有道謂以道爲理無爲化行守在四夷疆埸無事不必多貪土地以困黎元所以屏却兵革走馬之事人得俶載南畝以糞理田園也天下無道戎馬生於郊䟽郊者交也謂二國郊境之際拒守之地也天下無用道之君則荒塞有不賓之虜故兵戎軍馬生育於郊境之上謂乆而不還罪莫大於可欲䟽犯法爲罪貪求爲欲言戎馬生郊之罪由人君貪求土地見土地可欲欲心興動將起貪求此罪之大者故云罪莫大於可欲也禍莫大於不知足䟽禍害也神不祐也夫亡敗之禍緣何而來由貪土地求而無厭不知止足致神道不祐而嬰禍害人之有過過非一途貪之爲禍禍之大爾咎莫大於欲得䟽咎殃咎也夫貪冒之雄欲心增侈得之不已而又求之非道得之則不旋踵自招殃咎不亦宜乎可欲謂欲而未得初起貪心罪輕於禍不知足者得而更須禍重於罪莫甚於欲得者謂求之已得欲心尚無厭足則咎之爲過斯又甚於禍也故知足之足常足矣䟽此結有道之君也言有道之君無欲廣大不貪土地固於本分而知足則爲天下樂推身安國理此知足之足乃至於讓而常足矣注云物足者非知足心足者乃知足知足者謂足在於心不在於物循涯守分雖少而多有欲無厭雖多亦少矣不出户章第四十七前章明天下有道欲令知足常足此章明教不出户示以不爲而成初兩句標不出則能知次兩句明人和則天下順又兩句示彌岀之爲失後四句結無爲而化成爾不出户知天下䟽有道聖君無爲而理言教不出於户外淳風自洽於寰區此可謂知理天下之道爾又解曰人君善教天下應之以善則不煩出户而天下可知故易曰君子出其言善則千里之外應之况其邇者乎此之謂也不窺牖見天道䟽人天相應精氣交通人君爲政以德則象緯以之不迷威侮五行則陰陽由其舛候故書曰休徵則肅時兩若咎徵則蒙恒風若是知行發於己象著於天豈俟窺牖然後見也易曰言行君子所以動天地矣其出彌遠其知彌少䟽此明失道之君也不能處無爲而恭己將欲申教令以化人令出彌遠旣失無爲所知政理更爲寡少是以聖人不行而知䟽此覆釋不出户而知天下也無事無爲教令不出故云不行近取諸身遂知來物故我無爲而人自化豈待言教出户然後謂之知乎不見而名䟽此覆釋不窺牖見天道也夫鶴鳴即子和行感而天動原小可以知大審己可以知物元吉所召在乎其人則太平之化可得而言爾何必窺見然後名乎故云不見而名不爲而成䟽此總結不出不窺之義也夫以上有所爲下必有擾今聖人凝神端扆玄默廟堂君無爲人無事百姓家給萬化自成爲學日益章第四十八前章明不出不窺可以知政理之道此章明爲學爲道則至乎無爲之事首兩句示進修忘遣之漸次三句明損有歸無之益後四句結成其意戒有事不足以化人矣爲學日益爲道日損䟽爲修爲也損忘損也言初修學者日求見聞以爲益因益爲道則忘遣功行以爲損所以者何夫爲學者莫不初則因學以知道修功而補過終則悟理而忘言遺功而去執故注云益見聞爲修道之漸蓋言其初也損功行爲悟道之門蓋言其終矣損之又損以至於無爲䟽損之者謂損爲道者之功行也又損之者謂除忘功行之心也斯乃前損忘迹後損忘心心迹俱忘可謂造極則以至於無爲矣無爲而無不爲䟽夫有爲則有礙有礙則有所不爲今旣無爲無爲則無礙故能無所不爲也以謂契道則應用而周普也故上卷云道常無爲而無不爲取天下常以無事䟽此勸人君行無爲也取猶攝化也攝化天下必須爲無爲事無事無事則下人不擾無爲則百姓自安以斯臨莅于何不可所言常者無爲御物不可斯須離也及其有事不足以取天下䟽夫有事謂政令煩苛禁網凝密令苛則人擾網密則刑煩百姓不安四方離散欲求攝化不亦難乎故此有事不足以取天下矣唐玄宗御製道徳眞經䟽卷之六
