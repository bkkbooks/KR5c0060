body:
  text: 唐玄宗御製道德眞經䟽釋題效一老子者太上玄元皇帝之内號也玄玄道宗降生伊亳肅肅皇祖命氏我唐垂裕之訓無疆之祉長發遠祥系本瓜瓞其出處之迹方册備記道家以爲玉晨應號馬遷謂之隱君子而仲尼師之繙經中其大謾問禮嘆乎龍德是孔丘無間然矣在周室乆之將導西極關令尹喜請著書於是演二篇焉明道德生畜之源罔不盡此而其要在乎理身理國理國則絶矜尚華薄以無爲不言爲教故經曰道常無爲而無不爲侯王若能守萬物將自化又曰我無爲而人自化我無事而人自富我好靜而人自正我無欲而人自樸理身則少私寡欲以虚心實腹爲務故經曰常無欲以觀其妙又曰不貴難得之貨不見可欲又曰塞其兑閉其門挫其鋭解其紛而皆守之以柔弱雌靜故經曰柔勝剛弱勝强又曰知其雄守其雌此其大㫖也及乎窮理盡性閉緣息想處實行權坐忘遺照損之又損玄之又玄此殆不可得而言傳者矣其教圓其文約其㫖暢其言邇故游其廊廡者皆自以爲升堂睹奧及研精覃思然後知其於秋毫之端萬分未得其一也經曰有物混成先天地生吾不知其名字之曰道强爲之名曰大故知大道者虚極妙本之强名名其通生也莊子曰太初有無有無者言有此妙無也又曰無有無名無名者未立强名也故經曰無名天地之始强名通生曰道故經曰有名萬物之母莊子又曰物得以生謂之德德得也言天地萬變旁通品物皆資妙本而以生成得生爲德故經曰道生之德畜之則知道者德之體德者道之用也而經分上下者先明道而德之次也然體用之名可散也體用之實不可散也故經曰同出而異名同謂之玄語其出則分而爲二咨其同則混而爲一故曰可散而不可散也則上經曰是謂玄德又曰孔德之容又曰德者同於德又曰常德不離下經曰失道而後德又曰反者道之動又曰道生一又曰大道甚夷是知體用互陳遞明精要不必定名於上下也經徑也言通徑也又常也言通徑常行之道每惟聖祖垂訓貽厥孫謀聽理之餘伏勤講讀今復一二詮䟽其要妙者書不盡言粗舉大綱以裨助學者爾
