  text: 唐玄宗御製道德真經疏卷之一
  hash: sha256:b40918fdbd9fb85ed1138bb2f860b23173ce1e3f67ef284c608ce0a1ad98c39b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0060_HFL_001-001a, image: hfl/0356/0356-010.png}
body:
  text: 道可道章第一此章明妙本之由起萬化之宗源首標虛極之強名將明衆妙之歸趨故可道可名者明體用也無名有名者明本迹也無欲有欲者明兩觀也同出異名者明朴散而為器也同謂之玄者明成器而復朴也玄之又玄者辨兼忘也衆妙之門者示了出也所謂進修之階漸體悟之大方也道可道非常道疏道者虛極妙本之強名訓通訓徑首一字標宗也可道者言此妙本通生萬物是萬物之由徑可稱為道故云可道非常道者妙本生化用無定方強為之名不可遍舉故或大或逝或遠或近是不常於一道也故云非常道名可名非常名疏名者稱謂即物得道用之名首一字亦標宗也可名者言名生於用可與立名也非常名者在天則曰清在地則曰寧得一雖不殊約用則名異是不常於一名也故云非常名無名天地之始疏無名者萬化未作無強名也故莊子曰太初有無無有無名但其妙本降氣開闢天地天地相資以為本始故云無名天地之始則易之太極生兩儀也注云權輿者按爾雅云權輿始也有名萬物之母疏有名者應用匠成有強名也萬化既作品物生成妙本旁通以資人用由其茂養故謂之母也母以茂養為義然則無名有名者聖人約用以明本迹之同異而道不繫於有名無名也常無欲以觀其妙常有欲以觀其徼疏欲者性之動謂逐境而生心也言人常無欲正性清靜反照道源則觀見妙本矣若有欲逐境生心則性為欲亂以欲觀本既失沖和但見邊徼矣徼邊也又解云欲者思存之謂言欲有所思存而立教也常無欲者謂法清靜離於言説無所思存則見道之微妙也常有欲者謂從本起用因言立教應物遂通化成天下則見衆之所歸趨矣徼歸也此兩者同出而異名疏此者指上事也兩者謂可道可名無名有名無欲有欲各自其兩故云兩者俱稟妙本故云自本而降隨用立名則名異矣同謂之玄疏玄深妙也自出而論則名異是從本而降迹也自同而論則深妙是攝迹以歸本也歸本則深妙故謂之玄玄之又玄衆妙之門疏攝迹歸本謂之深妙若住斯妙其迹復存與彼異名等無差别故寄又玄以遣玄欲令不滯於玄本迹兩忘是名無住無住則了出矣注云意因不生者西升經云同出異名色各自生意因今不生意因是同於玄妙無欲於無欲者為生欲心故求無欲欲求無欲未離欲心今既無有欲亦無無欲遣之又遣可謂都忘正觀若斯是為衆妙其妙雖衆若出此門故云衆妙之門也天下皆知章第二前章明妙本生化入兩觀之不同此章明朴散異因萬殊而逐境逐境則流浪善化則歸根故首標美善妄情次示有無傾奪結以聖人之理冀達還淳之由天下皆知美之為美斯惡己皆知善之為善斯不善矣疏天下者舉大凡而言凡在天覆之下也美者心所甘美也善者身所履行也言天下之人皆知以己心所甘美者為美己身所履行者為善故論甘則忌辛好丹則非素共相傾奪競起是非皆由興動於欲心所以遞成乎美惡聖人知美惡無主俱是妄情妄情則不常故云惡已已語助也注云神奇臭腐者莊子云所美為神奇所惡為臭腐故有無之相生疏此明有無性空也夫有不自有因無而有凡俗則以為無生有無不自無因有而無凡俗則以為有生無故云相生而有無對法本不相生相生之名猶妄執起如美惡非自性生是皆空故聖人將欲救其迷滯是以歷言六者之惑難易之相成疏此明難易法空也此以難而彼成易此以易而彼成難亦如工者易於木難於埴陶匠易於埴而難於木故云難易之相成若同其所難則無易同其所易則無難難易無實妄生名稱是法空故能了之者巧拙兩忘則難易名息亦如美惡無定故也長短之相形疏此明長短相空也以長故形短以短故形長故云長短相形亦如鳧脛非短由鶴脛之長故續之則憂鶴脛非長由鳧脛之短故斷之則悲見短長相猶如美惡既無定禮皆是妄情高下之相傾疏此明高下名空也高下兩名互相傾奪故稱高必因於下又有高之者稱下必因於高又有下之者又高則所高非高又下則所下非下如彼世間凡諸有名位遞為臣妾亦復無常是皆空故故無定位音聲之相和疏此明和合空也五音相和成曲者誰總彼衆聲則能度曲如世間法皆和合成則體非真是皆空故將欲定其美惡豈云達觀之談前後之相隨疏此明三時念空也日月相代代故以新如彼投足孰為前後則前後之稱由相隨立名名由妄立誰識其初過去未來及以見在三時空故念念遷故亦如美惡無定名也是以聖人處無為之事行不言之教疏是以者説下以明上也夫飾智詐者雖拱默非無為也任真素者則終日措撝而未始不晏然矣故聖人知諸法性空自無矜執則理天下者當絶浮偽任用純德百姓化之各安其分各安其分則不擾豈非無為之事乎言出於己皆因天下之心則終身言未嘗言豈非不言之教耶萬物作而不辭疏作猶動也辭為辭謝也言聖人善化無事無為百姓不知爰遊爰豫各自得其動作而不辭謝於聖人故擊壤鼓腹而忘帝力此人忘聖功也生而不有為而不恃功成而不居疏令物各得成全其生理聖人不以為己有令物各得其營為聖人不恃為己功如此太平之功弘濟日遠猶且愼終如始不敢寧居此聖人自忘其功注云日愼一日尚書文也夫惟不居是以不去疏彼聖人者稠直如髮愼終如始本末不衰未嘗寧居而逸豫是以日新其盛德忘功而功不去光宅而天下安故云夫惟不居是以不去不尚賢章第三前章明萬殊逐境善化則歸根此章明貴尚不行無為則至理首標不尚絶矜徇之迹次云聖理示立教之方結以無為明化成而復朴也不尚賢使民不爭疏尚崇貴也賢才能也言人君崇貴才能則有迹飾偽者徇迹而失真失真必是尚賢之由徇迹定起交爭之弊不若陶之玄化任以無為使雲自從龍風常隨虎則唐虞在上不乏元凱之臣伊吕升朝自得台衡之望各當其分人無覬覦則不爭也不貴難得之貨使民不為盜疏人之受生所稟有分則所稟材器是身貨寶分外妄求求不可得故云難得夫不安性分希慕聰明且失天真盡成私盜今使賢愚襲性可否用情既無越分之求自輕難得之貨皆得性分誰為盜乎故莊子曰不仁之仁竊性命之情而叨富貴又解云以人君不貴珠犀寶貝則其政清靜故百姓化之自絶貪取人各知足故不為盜不見可欲使心不亂疏希慕聰明是見可欲欲心興動非亂而何今既不崇貴賢能亦不妄求越分則不見可欲之事而心不惑亂也是以聖人之治疏聖人治國理身以為教本夫理國者復何為乎但理身爾故虛心實腹絶欲忘知於為無為則無不理矣虛其心疏夫役心逐境則塵事汨昏靜慮全真則情欲不作情欲不作則心虛矣莊子曰虛室生白謂心虛則純白獨生也故曰虛其心實其腹疏腹者含受之義足則不貪欲使道德內充不生貪愛故云實其腹注云屬厭而止者春秋間沒汝寬諫魏獻子辭也欲以小人之腹為君子之心屬厭則足而不貪也弱其志疏志者心之事事在心曰志欲令心有所行皆守柔弱故知心虛則志弱矣強其骨疏骨者體之幹既其道德內充常無貪取不貪則腹實腹實則自骨強矣使民無知無欲疏聖人所以行虛心實腹之教者常欲使百姓無爭尚之知貪求之欲令其自化爾使夫知者不敢為也疏夫無知無欲者已清靜也則使夫有知者漸陶淳化不敢為徇迹貪求而無為也為無為則無不治矣疏夫得其性而為之雖為而無為也且絶尚賢之迹不求難得之貨人因本分物必全真於為無為復何矜徇化既無馨而無臭人故不識而不知淳風大行誰云不理道沖章第四前章明貴尚不行無為則至理此章明妙本之用在用而無為首標道沖示至虛之宗物次云挫解明沖用之釋紛又説和同之妙所在不雜光塵結以象帝之先欲令盡知歸趣爾道沖而用之或不盈淵兮似萬物之宗疏沖虛也謂道以沖虛為用也夫和氣沖虛故為道用用生萬物物被其功論功則物疑其光大語沖則道曾不盈滿而妙本深靜常為萬物之宗云或似者道非有法故不正言爾他皆放此挫其鋭解其紛疏挫抑止也鋭銛利也解釋散也紛多擾也沖虛之用物莫之違故銛利之心多擾之事念道沖和自令抑止釋散矣此則約人以明道用注云俗學求復者莊子繕性篇云繕性於俗俗學以求復其初言銛利紛擾因欲而生故念道則挫解俗學則彌結矣和其光同其塵湛兮似或存疏道之沖用於物不遺在光則與光為一在塵則與塵為一無所不在所在常無沖用則可混光塵妙本則湛然不雜故云似或也吾不知誰之子象帝之先疏吾者老君自稱象似也老君云吾見至道沖用生成萬物尋責所以不測由來既無父道之人故莫知道為誰子生物必資於道故似在乎帝先注云帝者生物之主易云帝出乎震輔嗣云帝者生物之主興益之宗也又解云兆見曰象言此生物之帝能兆見物象故謂之象帝爾天地不仁章第五前章明妙本沖用體用而無為此章明兼愛成私偏私則難普首標芻狗萬物示天地之兼忘次喻橐籥罔窮明用虛而不撓結以多言數屈欲令必守中和天地不仁以萬物為芻狗聖人不仁以百姓為芻狗疏仁者兼愛之目也芻草也謂結草為狗以用祭祀也莊子曰師金謂顔回曰夫芻狗之未陳巾以文繡及其已陳則蘇者取而爨之今天地至仁生成群物亦如人結草為狗不責其吠守之功不以生成為仁恩故云不仁也則聖人在宥天下視彼百姓亦當如此爾注云蔽蓋之恩者孔子曰蔽蓋不棄為埋狗也不獨親其親者禮運文也天地之間其猶橐籥乎虛而不屈動而愈出疏橐也謂以皮為橐鼓風以吹火也籥笛也言天地能芻狗萬物者為其間空虛故生成無私而不責望亦猶橐之鼓風笛之運吹常應求者於我無情故能虛之而不屈撓動之愈出聲氣以况人君虛心玄默淳化均一則無屈撓日用不知動而愈出也多言數窮不如守中疏多言者多有兼愛之言也多有兼愛之言而行難遍故數窮屈不遂是知不如忘懷虛應抱守中和則自然皆足矣注云不酬者酬答也謂空有其言而行不酬答谷神不死章第六前章明兼愛成私偏私則難普此章明至虛而應其應即不窮首標谷神寄神用以明道次云玄牝辨玄功之母物結以綿綿微妙玄示虛應則不勤勞也谷神不死是謂玄牝疏谷神者明谷之應聲似道之應物有感即應其應如神神者不測之名死以休息為義不測之應未嘗休息故云谷神不死玄深也牝母也谷神之應深妙難名萬物由其茂養故云是謂玄牝玄牝之門是謂天地根疏玄牝之用有感必應應由物出故謂之門天地有形之大者爾不得玄牝之用則將分裂發泄故資稟得一以為根本故云是謂天地之根本也綿綿若存用之不勤疏綿綿者微妙不絶之意虛牝之用應物無私微妙則稱為若存無私故用不勤倦天長地久章第七前章明谷神虛應虛應即不窮此章明天地無私無私故長久首則標天地以為喻次則舉聖人以轉明結以無私成私將欲勸勤此行天長地久疏此標章門也天以氣象故稱長地以形質故稱久天地所以能長且久者以其不自生故能長生疏前句標問此假答云天地所以能長且久者以其覆載萬物長育群材而皆資稟於妙本不自矜其生成之功用以是之故故能長久又解云不自生者言天地但生養萬物不自饒益其生故能長久是以聖人後其身而身先外其身而身存疏是以聖人效天地之覆載必均養而無私故推先與人百姓欣賴為下所仰故身先也不自矜貴而外薄其身天下歸仁則無畏害故身存也非以其無私邪故能成其私疏天地所以能長久聖人所以先存者非以其無自私之心故能成此長久先存之私乎上善若水章第八前章明天地無私生成則長久此章明至人善行柔弱故無尤首標若水示三能之近道次云居地書七善之利物結以不爭勸守柔而全勝也上善若水疏上善者標人也若水者舉喻也至人虛懷於法無住忘善而善是善之上上善之行如水之能具在下文皆含法喻水善利萬物而不爭處衆人之所惡疏水性甘涼散灑一切被其潤澤蒙利則長故云善利此一能也天下柔弱莫過於水平可取法清可鑒人乘流遇坎與之委順在人所引嘗不競爭此二能也惡居下流衆人恆趨水則就卑受濁處惡不辭此三能也故幾於道疏幾近也利物明其弘益不爭表其柔弱處惡示其含垢此水性之三能唯至人之一貫其行如此去道不遐故云近爾居善地疏至人所居善能弘益如水在地利物則多又地道用卑水好流下同至人之謙順幾道性之柔弱故云居善地心善淵疏至人之心善於安靜如水之性湛爾泉渟水靜則清明心間則了悟淵深靜也故云心善淵與善仁疏至人弘濟常以與人善施之功合乎仁行如水潤物無心愛憎故云與善仁言善信疏上善之人言必真實弘化凡庶善信不欺如彼泉流豈殊坎險故云言善信注云行險而不失其信者周易坎卦辭也政善治疏政正也至人於事動合無心正容悟物物因從正正則理非善而何如彼水性洗滌群物令其清靜故云政善治事善能疏至人圓明於物無礙凡有運動在事皆通通則善能是名照了如彼水性決之為川壅之為池浮舟涵虛無所不為是善能也動善時疏至人之心喻彼虛谷方之鏡像物感斯應如彼水性春泮冬凝與時消息故云動善時夫惟不爭故無尤疏尤過也至人善行與物無傷虛心曲全未曾爭競波流頽摩委順若斯既不違逆於物故無尤過之地矣持而盈之章第九前章明至人善行柔弱故無尤此章明凡俗溺情驕盈故有咎首標持盈揣鋭示其難保次云金玉富貴戒此貪求結以名遂身退令忘功而不處也持而盈之不如其己疏持執也盈滿也已止也言人心貪愛求取無厭執守保持使令盈滿積財為纍悔吝必生故聖人戒云不如休止揣而鋭之不可長保疏揣量度也鋭銛利也凡情滯溺貪求榮利故揣量前事銛鋭欲心鬼瞰人怨坐招殃咎故曰不可長保也金玉滿堂莫之能守疏假使貪求不已適令金玉滿堂象有齒而焚身雞畏犧而斷尾且失不貪之寶坐貽致寇之憂其以賈害豈云能守此復釋持盈也富貴而驕自遺其咎疏遺與也富則人求之故便欺物貴則人下之故好凌人驕奢至而不期殃咎來而誰與因驕獲咎驕自心生故云自遺爾此復釋揣鋭也功成名遂身退天之道疏此舉戒也夫滿則招損謙便受益惟彼天道尚不常盈故功成者隳名遂者虧欲求長保未聞斯語當須忘功與名退身辭盛如彼天道不失盈虛則無憂責矣載營魄章第十前章明縱欲溺情驕盈故有咎此章明養神愛氣不雜則無疵營魄已下至滌除戒修身所以全德愛人己下至明白示德全可以為君結以生之畜之表玄功之被物也載營魄抱一能無離乎疏載初也營護也言人受生始化但有虛象魄然既生則陽氣充滿虛魄魄能運動則謂之魂如月之魄照日則光生矣故春秋子産曰人生始化曰魄既生魄陽為魂言人初載虛魄當營護陽氣常使充滿則得生全若動用不恆消散陽氣則復成虛魄而死滅也莊子曰近死之心莫使復陽故令營護虛魄使復陽全生抱守淳一不令染雜無離身乎則生全矣此教養神也專氣致柔能如嬰兒乎疏專專一也氣沖和妙氣也人之受生沖氣為本若染雜塵境則沖氣離散神不固身故戒令專一沖和使致柔弱能如嬰兒無所耽著乎此教養氣滌除玄覽能無疵乎疏滌洗也除理也玄覽心照也疵病也人之耽染為起欲心當須洗滌除理使心照清淨愛欲不起能令無疵病乎此教滌心也愛民治國能無為乎疏愛民者使之不暴卒役之不傷性理國者務農而重穀事簡而不煩則人安其生不言而化也此無為也能為之乎天門開闔能為雌乎疏修德可以為君為君須承曆數即天門者帝王曆數所從出也開謂受命闔為廢黜天降寶命以祚有道能守雌柔可享元吉故云能為雌乎又解云易曰一闔一闢謂之變言聖人設教應變無常不以雄盛而守雌牝亦如天門開闔虧盈而益謙也明白四達能無知乎疏帝王既受曆數臨御萬方若能守雌靜則其德明白如日之照四達天下功被於物不以為功所謂忘功若無知者故云能無知乎生之畜之疏下經云道生之德畜之此云生之畜之者謂人君法道清靜令物得遂其生成效德弘濟令物各盡其畜養故云生之畜之生而不有為而不恃長而不宰是謂玄德疏物得遂生聖忘功用遂生則生理自足忘功則功用常全斯乃無私而成私不宰而為真宰也故生而不有者令物各遂其生君不以為己有也為而不恃者令物各得其動用而不自負恃為己功也長而不宰者居萬民之上故云長而不恃其功故云不宰也如是是謂深玄妙之德矣唐玄宗御製道德真經疏卷之一
