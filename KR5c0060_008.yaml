front:
  text: 唐玄宗御製道德眞經䟽卷之八效八
  hash: sha256:ed66e26cedb191fb1fbf2c9341d568823c7a756ce3a81d2a2e57f39ada0219da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0060_HFL_008-001a, image: hfl/0357/0357-078.png}
body:
  text: 以政治國章第五十七前章明悟道之士能了言而無執此章明以政之君失無爲之自化三句標門以示義次十句設問以明理後五句示無事可以取天下以政理國䟽此上三句並標宗也以用也政教也有爲之君矜用政教而欲爲治不能無爲任物自化欲求致理未之前聞也以竒用兵䟽奇變詐也不祥之器君子惡之况加變詐之名而無節制之用是以兵猶火也不戢將自焚故知奇變之兵非制勝之道也以無事取天下䟽此亦標也有道之君無爲而理夫無爲則無事無事則不煩不煩則百姓自化而天下太平矣吾何以知天下之然哉以此䟽吾何以知發問也其然猶如是也以此答也老君詳問我何以知取天下必須無事無爲以下文云天下多忌諱則人彌貧我無爲則人自化驗可知爾天下多忌諱而民彌貧䟽此覆釋以政理國也爲天下之主不能敦清靜以化人崇簡易以臨物政煩網密下人無所措其手足避諱無暇動失生業日就困窮所以彌貧人多利器國家滋昏䟽此釋上以奇用兵也利器者權謀也夫權道在乎適時不得已而方用人君若多用權謀不能反實下必應之以譎詐故云滋益昏亂也人多伎巧奇物滋起䟽伎能也巧工巧也奇物謂刻鏤雕琢寳貨珍玩之屬言人君不尚純樸而好浮華則百姓效上而爲奢泰馳競淫飾日以繁多也法令滋彰盜賊多有䟽法刑法也令教令也君上不能寡欲以御人而欲彰法令以齊物人旣苟免而無耻吏則竊盜而爲奸上下相蒙故令盜賊多有也故聖人云我無爲而民自化䟽此釋無事以取天下也我謂聖人也夫聖人之德不尚伎巧體道之主所貴無爲無爲之爲無所禁忌下化上之無爲故云而民自化我無事而民自富䟽上無賦斂下不煩擾耕田鑿井家給民足故云而民自富我好靜而民自正䟽人生而靜天之性也上好安靜無以動揺及下被君德率性而自正也我無欲而民自樸䟽人君誠能内守沖和外無營欲則下之感化自淳樸也其政悶悶章第五十八前章明以政之君失無爲之自化此章明以政必敗示禍福之所由初標二政寬急不同次明禍福二門倚伏無準人之迷下衆生之迷執是以聖人下舉聖德以勸修其政悶悶其民淳淳䟽悶悶無心寬裕也淳淳質樸敦厚也言無爲之君政教寬大任物自成旣無苛暴故其俗淳淳而質樸也其政察察其民缺缺䟽察察有爲嚴極缺缺凋弊離散也有爲之君其政峻急以法繩人法令滋彰盜賊多有故凋弊而離散矣禍兮福所倚福兮禍所伏孰知其極䟽禍兮福所倚者前言悶悶之政俗以爲惡而人反淳淳質樸敦厚豈非福因禍而生也福兮禍所伏者伏藏也察察之政俗以爲善物却缺缺而凋弊豈非禍伏藏於福中而發也孰知其極者夫失道喪德習僞尚華禍福循環倚伏無凖誰知窮極者其無正耶䟽此言禍福之極豈無正定耶但由於人不能體道無爲妄生迷執失其正爾正復爲奇善復爲妖䟽此釋迷正所由也言衆生迷於禍福正處於正不明以正者爲奇詐於善不了以善者爲妖祥故若無正爾民之迷其日固己乆矣䟽此嘆衆生迷於正善反以爲奇爲妖其所由來尚矣故云其日固乆是以聖人方而不割䟽方由正也此舉聖德以勸修聖人弘道濟代萬物向方身行正方物則應之而自正非立教裁割於物使從已也廉而不穢䟽廉清廉也穢濁也聖人率性清廉自然化下穢彼之濁以揚其清有本爲劌字劌者傷也聖人廉以成行不傷於物直而不肆䟽肆申也聖人之行不邪彼自從而正直非爲彼之不正而申直以正曲也光而不耀䟽光者謂明智也聖人雖有明智而韜晦之不以炫耀故云光而不耀聖德如此自然百姓淳淳而從化也治人事天章第五十九前章明無爲之政人致淳和此章明理人事天無過用儉初標理人事天莫先于嗇次夫唯下轉通前義是謂下舉深根之喻以况長乆之道治人事天莫若嗇䟽嗇愛也言人君將欲理化下人敬事上帝爲德之先無如愛費即儉德也儉即足用可以聚人粢盛豐備天享明德故云莫若嗇也夫唯嗇是謂早服䟽夫唯嗇疊出上文也是謂早服釋儉嗇之義凡有七轉義皆效此夫唯者發語之辭也服者事也夫唯能儉愛之君理人事天以儉爲政者是以普天之下亦當早服事於君早服謂之重積德䟽何故普天仰化率土歸仁由行節儉節儉則百姓早服事之是重積其德以爾重積德則無不克䟽克能也君若厚積其德者其爲政也人力普存其事天也吉無不利則四方向化無有不能制服者無不克則莫知其極䟽此謂君德無有不能制伏者則殊俗慕化絶域觀風無遠不至故莫知窮極也莫知其極可以有國䟽言人君德化無遠不及萬人所歸往神明所福享然後可稱爲有國故易云王假有廟有家是也過此以往豈爲國乎有國之母可以長乆䟽母者道也以茂養爲義夫所以得稱有國者只緣有道而茂養蒼生若爾福祚永昌可以長乆是謂深根固蒂長生乆視之道䟽夫積德之君以道爲國則可以長乆故舉根蒂之喻以申其義理也蒂花趺也夫草木根深則榮茂蒂固則不落乃長乆也以喻積德之君埋根於道固蒂於德命延謂之長生乆視之道治大國章第六十前章明理人儉愛則萬方早服此章明早服不擾則其德交歸初歸理國之喻不可有爲次明德及鬼神兩無傷害後結嘆交歸之德以勸有國之君治大國若烹小鮮䟽此喻説也小鮮小魚也言烹小魚不可撓撓則魚潰喻理大國者不可煩煩則人亂皆須用道所以成功爾以道莅天下其鬼不神䟽以用也莅臨也人神處幽爲鬼神者靈效之謂夫人有求則神爲應今若上德之化人自安全豈惟上忘帝力亦不旁請鬼神故處幽之鬼無以效其明靈也非其鬼不神其神不傷民䟽此覆釋鬼無效靈之義非其鬼不神者非謂鬼歇滅而不爲神但妖之將興由人有舋人恒其德則神不見怪而傷人也春秋曰其炁焰以取之非其神不傷人聖人亦不傷人䟽所言神不傷人者豈但神靈無效而不能傷害於人而聖人以道臨人無爲不擾百姓自正故云聖人以道莅天下爾將欲發明聖德故重云亦不傷人夫兩不相傷故德交歸焉䟽兩者謂聖與神也夫人國之本亦神之主若鬼神傷人則害國之本聖人傷人則匱神之主今兩不相害故德交歸豈唯神聖獨豐抑亦兆人咸賴大國者下流章第六十一前章明以道莅物則其德交歸此章明以德下人則物歸謙讓初標大國用謙故能攝化次故大國下叙大小各得所欲後故大者下偏誡大國特宜用謙大國者下流天下之交䟽江海處衆流之下百川委輸故曰下流施之於人是謙德也夫人君者有道則國存無德則人散故處大國者當下流開納令天下之人交會而至則能全其大故曰下流天下之交天下之交牝牝常以靜勝牡䟽天下之交牒出前文所以結下流之義也言天下之人所以交會至者猶大國謙下之故喻如牡者常以雌靜爲牝動者所求故云牝常以靜勝牡以靜爲下䟽前云天下之人所以友會而至者由人君用謙卑之道則如牝者常以雌靜而能勝牡者由以安靜爲下故爾故大國以下小國則取小國䟽故者仍上之文以結成前義也言大國之君所以不事威武而用謙卑之德以柔服之小者將欲懷來附庸之君取其小國之人而爲臣妾爾小國以下大國則取大國䟽言大國之君旣以謙卑之道而柔服小國小國之君則朝聘會盟不敢離叛以卑下之禮而事大國者則欲取大國之威以爲援助爾故或下以取或下而取䟽春秋曰師能左右之曰以下或下以取者言大國用謙卑之道以取小國則令其可左右故云以取或下而取者言小國用謙下之道歸事大但可承奉而求援助不能令其左右隨意故云而取大國不過欲兼畜人小國不過欲入事人䟽言大國尊崇謙下以取小國者更無餘意不過欲兼畜小國之臣爲人君之長小國用謙陳薦贄幣而取大國者不過欲入事大國資爲援助爾兩者各得其所欲故大者宜爲下䟽大欲畜養小欲入事兩遂其願故云各得所欲大者宜爲下者夫物未嘗以小輕大而必以大凌小將恐大國之君驕盈致禍鮮能下之故誡云大者特宜爲謙下爾道者萬物之奥章第六十二前章明以德下人則大小各得其所欲此章明以道化物則善惡皆蒙其資怙初標道體沖奧次明立教化人後古之下嘆道之功可爲尊貴爾道者萬物之奧䟽道者妙本之强名也奥内也言道包含無外是萬物資始之所故爲萬物之奥内西昇經云道深甚奥虚無之淵此之謂也善人之寳䟽寳者珍寳之謂也善人者體道無爲身心清靜故寳貴之無暫違也不善人之所保䟽保任也倚也不善之徒心尤明智感於積習平居則忽道嬰難則求之以身保任於道倚以求安也美言可以市尊行可以加人䟽此喻説也言不善之人亦在教之而已注云甘美之言可以求市尊高之行可以加人以况於聖人以甘美法味之言尊高清靜之行以化不善之人亦如市賈之集相率而從善矣故下云人之不善何棄之有䟽言人言行不善何棄遺之有乎當導之以善道冀從化而悛惡不可棄之而不化故云何棄之有故立天子置三公䟽三公謂太師太傅太保也天子無爲三公論道皆所以垂訓立教化不善之人書云天工人其代之此之謂也雖有拱璧以先駟馬不如坐進此道䟽合拱之璧璧之大者駟乗之馬馬之良者言三公輔相雖以璧馬獻之至尊未足珍貴不如進無爲之道令化惡歸善爾拱璧先駟馬者古者朝聘將進駟馬以璧爲導故稱先也春秋云乗韋先牛十二犒師之類是也古之所以貴此道者何䟽舉古證今令物生信古之即前文善人寳道也問其所以寳貴此道其意何也不日求以得有罪以免耶故爲天下貴䟽此答釋貴道之意不日求以得者言道在於悟悟在了心非如有爲之法積日計年營求以致之爾但澄心窒欲則純白自生也故云不日求以得有罪以免耶者夫妄心起染則業累斯生若悟道虚心則罪因自滅豈如執滯之人動生悔吝嬰彼罪罰方求免耶以是之故故爲天下善人之所寳貴爾爲無爲章第六十三前章明妙本沖奥坐進是輔相之門此章明玄默無爲息怨成修證之行首標坐忘絶欲次示杜惡防萌後是以下舉聖人之德以申結勸爾爲無爲事無事味無味大小多少報怨以德䟽爲造作也修道行人則坐忘去欲心無造作凡所施設功與化冥於爲非爲故曰無爲此明心也即事不滯故於事而無事此明身也即味不耽故於味而無味此明口也三業旣盡六根塵自息爾若夫大小之爲多少之事苟涉有爲之境無非怨對之讎若能體彼無爲捨兹有欲悟眞實相無起慮心自然怨對不生可謂報怨以德爾圖難於其易爲大於其細䟽圖謀度也爲營爲也夫情欲傷生皆生於漸無不始於易而終成難初於細而後成大今謀度其始易之時則於終無難營爲於初細之日則於後無大若爲難於難爲大於大禍亂已作縱欲圖而爲之將無益於患難也天下難事必作於易天下大事必作於細䟽作起也此疊上文原禍難之所起難事必起於易欲令於易而圖之大事必起於細欲令於細而去之其類實繁不可具舉故以天下而總言之爾是以聖人終不爲大故能成其大䟽前明凡人常爲難大之事故多敗多難是以舉聖人終不爲難事大事故能成其尊大夫輕諾必寡信多易必多難䟽此結喻也夫不三思而後言輕易其然諾者必少忠信不謀始而愼終多易其行事者後必生難而爲患累是以聖人猶難之故終無難䟽聖人即有道之君也猶難之者難爲輕諾多易之事况不如聖者乎聖人猶難爲輕諾多易故終無難大之事爾其安易持章第六十四前章明無爲玄默示息怨修道之門此章明思患預防標絶情去欲之行初六句迭明防患之漸次六句舉喻生患之由復兩句論爲執之迷又六句申異凡之行後七句推聖人不欲不學之意勸凡俗易持易謀之心其安易持䟽安靜也持執也言人之受生正性清靜感物而動則逐欲無窮今明欲心未動安靜之時將欲守之令不散亂則甚易持執故云其安易持其未兆易謀䟽兆萌漸也謀度也情欲將起未有萌兆謀杜絶之亦爲甚易故云其未兆易謀其脆易破䟽言欲心已動柔脆未堅將欲除之易消破也其微易散䟽微細也禍患細微未至於大防之於初欲令散釋亦甚易爾爲之於未有䟽爲修除也此一句釋前易持易謀兩句也所以易者明欲心未起之時修除杜絶則欲惡不生故云爲之於未有理之於未亂䟽此一句釋上易破易散兩句也所以易者明欲惡雖有尚自脆微未成禍亂故易理爾合抱之木生於毫末九層之臺起於累土千里之行始於足下䟽此言患生於微而成於著喻如合抱之木始生如毫毛之末此明自性而生也九層之高臺起乎一簣之上此明積習而成也千里之遠行始於舉足之下此明遂行不止也則天下之事誠以細微爲始而人多忽之遂成患本故舉三喻以證上文爲者敗之執者失之䟽爲謂營爲也執謂執著也言人不能爲之於未有理之於未亂而更有所營爲於性分之外執著於塵境之中故必禍敗而失亡也是以聖人無爲故無敗無執故無失䟽聖人無爲安靜故素分成全而無敗虚忘無執故眞性常存而無失民之從事常於幾成而敗之䟽幾近也言常俗之人從於善事常以功業近成不能愼終乃復亡敗也愼終如始則無敗事䟽此老君重申勸戒也人若能愼末如初終始常一則其事無敗也故書云摩不有初鮮克有終是以聖人欲不欲不貴難得之貨䟽此明聖行以斥凡也難得之貨内謂性分所無外謂珠犀寳貝聖人於欲無欲内不務於性分之所無外不營於累德之寳貨故云不貴難得之貨爾學不學復衆民之所過䟽凡夫貴難得之貨故矯徇矜尚以學性分之所無聖人不求過分之學常全自然之性是於學不學如此者將欲歸復衆人所過分之學爾以輔萬物之自然而不敢爲䟽輔佐也自然物之本性也衆生起妄失於本性聖人慈誘勸學無爲將以輔佐物之自然眞性不敗故不敢爲於俗學與多欲也唐玄宗御製道德眞經䟽卷之八
