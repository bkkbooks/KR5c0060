front:
  text: 唐玄宗御製道德真經疏卷之三
  hash: sha256:ce9ea7991a77bb6706987c7dc8be7c56c201e4e2f2a5f07ab0fb512b9c3b571e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0060_HFL_003-001a, image: hfl/0356/0356-086.png}
body:
  text: 絶聖章第十九前章明風俗頽弊失道而仁義遂行此章明絶棄多門還淳則盜賊無有首六句且絶矜徇之迹次三句將明立教之方後四句示行門之由趣爾絶聖棄智民利百倍疏聖者有為制作之聖智者凡俗矜徇之智制作之聖則有迹矜徇之智則非真失真是生巧僞逐迹坐令喪本故皆絶棄之而令其淳朴天和既暢矜徇不行是人有百倍之利也絶仁棄義民復孝慈疏前章云大道廢有仁義此云絶仁棄義民復孝慈者明大道之世所謂玄同民無私親悉皆慈孝故理至則迹滅事當而名去今六紀廢絶則孝慈名彰若絶兼愛之仁棄裁非之義江湖無濡沫之迹慈孝有自然之素故民復於大孝慈矣絶巧棄利盜賊無有疏絶巧者絶雕琢非法淫過之巧棄利者棄徇財兼并乾沒之利夫盜賊者生於羡欲不足令絶巧則人不爭棄利則人自足復誰為盜賊乎故云無有此三者以為文不足故令有所屬疏三者謂絶聖棄智一也絶仁棄義二也絶巧棄利三也此三者且令絶棄未有修行故以為此三者於文不足以垂教更令有所屬著在下文見素等是也見素抱朴少私寡欲疏欲求絶聖棄智則常見真素欲求絶仁棄義則懷抱質朴欲求絶巧棄利則當少私寡欲三絶雖於文不足四行則修身有餘將欲禁絶於中心故必取資於內行爾絶學無憂章第二十前章明絶棄多門還淳則盜賊無有此章明畏除俗學若昏故獨異於人首一句標門以示絶次七句舉喻以明理又一十七句格凡聖以對辨後兩句論獨行以結成絶學無憂疏絶學者絶有為俗學也夫人之禀生必有真素越分求學傷性則多若令都絶不為是使物無修習今明乃絶有為過分之學即莊子所謂俗學以求復其初者若分內之學因性之為上士勤行未為不絶也故曰絶學無憂唯之與阿相去幾何善之與惡相去何若疏唯恭應也周禮曰先生召無諾唯而起阿慢應也漢書曰不誰何綰謂何問也此舉喻也唯之與阿同出於口唯恭則善阿慢則惡學之不絶只在於心絶之則無憂不絶則生患同出於口故云相去幾何只在於心故去相去何若若能了學無學學相皆空於知忘知不生分别則唯阿齊致善惡兩忘也人之所畏不可不畏疏人之所畏者畏慢與惡也夫慢則為過惡則被嫌被嫌則人所棄薄為過則物多尤怨以况有為俗學增長是非若不畏而絶之是皆違分傷性故不可畏而絶之也荒兮其未央哉疏荒廢也慢惡為過俗學失真是皆可畏故當絶棄若不絶而棄之則正性荒廢其未有央止之時詩曰夜未央言更漏尚多也此云其未央言俗學傷性無息止期故前途尚多云未央也衆人熙熙如享太牢如登春臺疏熙熙者情欲搖動之貌此明不畏絶俗學之人夫俗學有為動生情欲熙熙逐境役役終身如餒夫之臨享太牢恣貪滋味冶容之春臺登望動生愛著太牢者牛羊豕也春臺所以為愛著者謂其卉木滋榮禽鳥鳴匹陽和陶然易淫蕩也故邠詩云春日遲遲采蘩祁祁汝心傷悲逮及公子同歸也我獨怕兮其未兆如嬰兒之未孩疏我老君自稱言我畏絶俗學抱道含和獨能怕然安靜於彼世間有為之事情欲等法略無形兆如彼嬰兒未能孩笑無分别也孩者别人之意莊子曰不至於孩而始誰乘乘兮若無所歸疏乘乘運動之貌也衆人動生耽著常有執求故若有所歸往我本無心怕然安靜乘流則逝值坎而止若彼行道之人無所歸趣不汲汲也衆人皆有餘而我獨若遺疏衆人俗學耽著矜誇巧智是法皆執自為有餘我獨損之未嘗凝滯心無愛染故若遺忘也我愚人之心也哉純純兮疏言我於諸法中體了無著故若遺忘豈如愚人之心也但我心純純質朴無愛欲故若遺爾俗人昭昭我獨若昏俗人察察我獨悶悶忽若晦寂號似無所止疏昭昭自矜衒巧智也若昏者若昏昧無所分别也察察者施教立法以繩下也悶悶者無心寬大之意也所以昭昭矜衒察察施教者皆由不絶俗學與有為故聖人畏絶若昏默也忽若晦寂兮似無所止疏絶學之人忽忽無心常若昏昧而心寂然曾不愛染於法無住故似無所止著爾衆人皆有以我獨頑似鄙疏凡俗之人不畏俗學所以耽滯逐境未曾休息我於世間獨無分别有似鄙陋頑者無分别也鄙者陋不足也而心實了悟故云似爾自衆人熙熙下皆對明也我獨異於人而貴求食於母疏此兩句結成也我獨異於人者異於不絶俗學之凡人也即上對明諸法與凡人異凡人愛染有為我獨遺忘情欲凡人於諸法分别我獨等無是非故云異於人而貴求食於母者老君戒人守朴全和少私寡欲絶視聽之耽著杜聲名之奔競令如嬰兒但求食於母爾故云而貴求食於母孔德之容章第二十一前章明畏絶俗學若昏故獨異於人此章明從順至道甚真則能閲衆甫首標孔德兩句明德人之順道次道之為物下十句暢妙本之精自古下五句辨應用之名結生成之德爾孔德之容唯道是從疏孔甚也從順也容容狀也欲明行人所以順合至道故云甚有德人之容狀若何言甚有德人之容狀唯虛極之道是順爾道之為物惟恍惟惚疏此明虛極妙本為物形狀即孔德所從之道也虛極妙本强名曰道道之為物其運動形狀若何言此妙本不有不無難為名稱欲謂之有則寂然無象欲為之無則湛似或存無有難名故謂之為恍惚爾惚兮恍兮其中有象疏此明降生本迹也惚無也恍有也兆見曰象妙本無物故謂之惚生化有形故謂之恍斯則自無而降有其中兆見一切物象從本而降迹也恍兮惚兮其中有物疏物者即上道之為物謂妙本也妙本降生兆見衆象修性反德則復歸無物無物即道也言人修性反德不離妙本自有歸無遺冥至道故云其中有物言有妙物也此攝迹以歸本也窈兮冥兮其中有精疏窈冥深昧也虛極降生修性反本攝迹歸本妙物或存窈冥深昧不可量測含孕變化中有至精故云其中有精也其精甚真其中有信疏至道妙物既本非假雜變化至精故其精甚真生成之功遍被群有物感必應曾不差違故云其中有信自古及今其名不去以閲衆甫疏閲度閲也甫本始也言道德生成之功窈冥真精之信始終無極今古不渝故物得道用之名天清地寧之類自古至今常不去也故注云生成之用既今古是同應用之名故古今不去也以此精真之信度閲萬物本始令各遂其生成之用爾吾何以知衆甫之然哉以此疏又詳云吾何知萬物本始皆禀於道道必度閲之令達其生成用然哉答云以此甚精甚信凡今萬物皆禀生成故知之爾曲則全章第二十二前章明從順至道甚真故能閲衆甫此章明抱一為式不爭則所謂曲全者六句示誠全之行是以下兩句標聖行以明次四句覆釋曲全至弊新夫唯下結不爭必全而歸爾曲則全疏曲者委曲從順者也言人能委曲從順不與物忤則可以全身故云曲則全枉則直疏枉者受屈於物直者可以正曲也春秋曰正曲為直言人雖不與物忤若物來枉己己能受屈彼必慚懼而自修整則是己之直可以正曲故云枉則直窪則盈疏窪坳下盈滿也此喻說也夫地之坳下水必流滿人守撝謙德便光大能曲能枉坳下也則全則直滿盈也故云窪則盈弊則新疏弊薄惡之謂也曲枉窪等皆自處弊薄也能處弊薄人必推先故其德行日新矣故曰弊則新少則得多則惑是以聖人抱一為天下式疏夫少自取者則無失故云得多自與者人必爭故云惑修身既爾修道亦然當須抱守淳一自全真素若欲廣求異門則招亂惑故亡羊必因歧路喪生諒在多方是以聖人抱一不離可為天下法式矣式法也不自見故明疏此覆釋曲則全也言人能不自見其美嘗委順於物其全德日益明白也故云故明不自是故彰疏此覆釋枉則直也言人能為物受枉不自申說以為己是是必無尤故其直自彰著也故云故彰不自伐故有功疏此覆釋窪則盈也言人不自伐取嘗為謙讓則人不與競其功歸己如地坳下水必盈焉故云故有功不自矜故長疏此覆釋弊則新也言人能守弊薄不自矜炫則人必推敬善行益長故云故長夫唯不爭故天下莫能與之爭疏夫唯曲全等行皆是委順不爭柔弱既勝於剛强謙虛自歸於枉直則天下人物誰能與爭乎故云莫能與之爭古之所謂曲則全者豈虛言哉誠全而歸之疏此引古以結曲全也言自古有此曲全之言豈虛有此言而無實者哉若能曲順不逆者信有全理歸之於己爾故云誠全而歸之誠信也希言自然章第二十三前章明抱一為式不爭故所謂曲全此章明契道忘言執滯則自同於失首一句標宗以明理次五句舉喻以申教故從事下廣理喻以結成希言自然疏此明言教不可執滯希言者忘言也夫言者在乎悟道悟道則忘言不可都忘要其詮理但自然之理不當有與不有希言之義亦不定言故以希言之言用顯自然之理故云希爾若能因彼言教悟證精微不滯筌蹄則合於自然矣故云希言自然飄風不終朝驟雨不終日疏飄風狂疾之風也驟雨暴急之雨也夫風者所以散物雨者所以潤物若狂疾暴急則害物而不久以况言教所以詮理若執言滯教則無由悟了必失道而生迷故風雨不可飄驟言教不可執滯也欲明忘言即合自然故舉飄風驟雨之喻爾孰為此者天地天地尚不能久而况於人乎疏孰誰也設問云誰為此飄風驟雨者答云天地天地至大欲為狂暴尚不能久况於凡人執滯言教而為卒暴不能虛忘漸致造極欲求了悟其可得乎故從事於道者疏從者順也虛極至道沖用無方在物則通未嘗凝滯故凡人欲體斯妙道而順者不當有所執滯爾故云從事於道道者同於道疏順同於道之人故謂之道者謂能順事於道則不凝滯悟了言教一無封執可與道同故云同於道爾德者同於德疏德者道用之名也謂其功用被物物有所得故謂之德爾謂體悟之人順事於道豈唯自能了出抑亦功濟蒼生蒼生被其德德者忘其功凡所施為同於道用故云德者同於德爾失者同於失疏失者謂執滯言教而失道也夫言教者道理之筌蹄也有筌蹄者乃得魚兔今滯守筌蹄則失魚兔矣執滯言教則失妙理矣失理則無由得道是自同於失也故云失者同於失同於道者道亦得之同於德者德亦得之同於失者失亦得之疏此明氣同則應也故虎嘯風生鶴鳴子和性殊則肝膽楚越道合則夷夏同人以類相從物無違者故同道則道應同失則失來猶方諸挹月而水流陽燧照日而火就爾故云同於道者道亦得之信不足有不信疏言人之所以不能體了證理忘言謂於信悟不足而生惑滯既生惑滯則執言求悟執言求悟則却生迷倒是有不信應之也故云有不信也跂者不立章第二十四前章明理契言忘執滯則同於失者此章明自見自是矜伐故物或惡之首兩句舉喻示難求次四句明雖求亦不得其於道下將申戒勸令有道之人不處跂者不立跨者不行疏跂舉踵而望也跨以跨挾物也此舉喻也夫延頸舉踵欲求遠望翹跂則危故不可立以跨挾物物必為礙必不可行亦如衆生自見自是等也故跂者不立跨則不行自見則不明自是則不彰斷可知矣自見者不明疏夫自見之人失於殷鑒露才揚己欲以自明殊不知動則見尤物無與者己之事業終於昧然故云自見者不明自是者不彰疏言人不能曲全而自以為是且欲大誇諸己而以出衆為心求彰名迹以自光大直為怨府人所不堪衆毁日聞故難彰著故云自是者不彰自伐者無功疏夫謙者德之柄讓者禮之文苟失斯道無從而可况自專固伐取欲以求功不讓則爭功斯濫矣故云自伐者無功自矜者不長疏盛德若愚昔賢通議矜衒名器醜行則多人所鄙薄坐招嗤誚自矜雖欲求益胥怨物不推長故云自矜不長其於道也曰餘食贅行疏餘食者殘餘之食贅行者疣贅之行也殘餘食之穢疣贅身之病以此自見自是等行其於道而論之如殘餘疣贅人所共惡也謂之贅行者為自見自是等為德行之疣贅故云贅行春秋曰人將不食吾餘莊子曰附疣懸贅出乎形而侈於性物或惡之故有道者不處疏此自見自是等既若餘食贅行凡物尚或惡之而不為故有道之君子不處身於此事矣有物混成章第二十五前章明自見自是於道為餘食贅行末云有道不處此章明曰大三逝贊道乃先天混成終令法道自然首標有物混成六句將明妙本之絶趣物被其功次云吾不知下六句欲表强名之由緒名亦不可得故道下六句示知四大之生育申戒人君之法下至終篇教以法道自然無為清淨耳有物混成先天地生疏有物者妙物也即虛極妙本也將欲申明强名所由不可即此道故云有物爾言此妙物混然而成含孕衆象尋其生化乃在天地之先故云先天地生爾寂兮寥兮獨立而不改周行而不殆疏寂寥者嘆有物之體寂寥虛靜妙本湛然故獨立而不移改物感必應應用無心遍於群有故周行而不危殆可以為天下母疏妙本生化遍於群有群有之物無非匠成萬物彼其茂養之德故可以為天下母爾母以茂養為義也吾不知其名字之曰道强為之名曰大疏字者表其德名者定其體老君云妙本生化沖用莫窮寂寥虛靜不可定其形狀先天地生難以言其氏族故吾不知其名但見其大通於物將欲表其本然之德故字之曰道見其包含無外將欲定其至無之體故强名曰大凡物先名而後字者以其自小而成大以道先字而後名者是以從本而降迹爾大曰逝逝曰遠遠曰返疏夫滯於一方者非天下之至通也故天職生覆而不能形載地職形載而不能生覆唯妙本之用用無定方雖則强名曰大而復不離於大自大而求之則逝而往矣自往而求之則遠不及矣自遠而求之則復返在人身心故曰遠曰返莊子曰夫道於大不終於細不遺故道大天大地大王亦大疏因强名曰大而舉所以次大者故天能顚玄在上垂覆萬物地能寧靜於下厚載萬物王能清靜無為而化萬物此三大也吾道一以貫之矣域中有四大而王居其一焉疏域中者限域也今玄域中之大道不只在域中若云約所見而言則天地自為限域道亦不在域中矣夫惟寄語以申玄理亦不必曲生異義存文以防疑難衆說皆未盡通今明域者名也以名為體以為物無名外之體故曰域中若舉道則道在其中矣舉天名則天無遺體矣故云域中即有名之中有此四大云而王居一者王為人靈之首有道則萬物被其德無道則天地蒙其害故特標而王居一欲令法道自然人法地地法天天法道道法自然疏人謂王者也所以云人者謂人能法天地生成法道清靜則天下歸往是以為王若不然則物無所歸往故稱人以戒爾為王者當法地安靜因其安靜又當法天生化功被物矣又當法道清靜無為忘功於物令物自化人君能爾即合道法自然言道之為法自然非復倣自然也若如惑者之難以道法效於自然是則域中有五大非四大也又引西升經云虛無生自然自然生道則以道為虛無之孫自然之子妄生先後之義以定尊卑之目塞源拔本倒置何深且嘗試論曰虛無者妙本之體體非有物故曰虛無自然者妙本之性性非造作故曰自然道者妙本之功用所謂强名無非通生故謂之道幻體用名即謂之虛無自然道爾尋其所以即一妙本復何所相倣法乎則知惑者之難不詣夫玄鍵矣重為輕根章第二十六前章舉域中稱大終令法道自然此章明重靜為君以戒身輕天下首兩句標宗以示義次兩句舉喻以即明又四句傷人君之失道末兩句述輕躁以為戒重為輕根靜為躁君疏根本也草木花葉之花葉輕花葉禀根蒂而生則根蒂躁既重為本故曰重為輕根夫重則靜輕則躁躁則靜輕者根則靜為躁者君矣是知重有制輕之功靜有持躁之力故權重則屬鼻之纊斯舉心靜則朵頤之求自息是以君子終日行不離輜重疏君子者謂人主也言其志可以君人子物故云君子輜屏車也重者是輕者原也此舉喻也言人君常守重靜猶如所為之不離輜重行者若失輜重則無所取給必遭凍餒人君若好輕躁則臣下離散必生禍患故云終日行不離輜重雖有榮觀燕處超然疏夫人君好重靜則百姓不煩勞若登高臺泛深池撞鐘舞女以為榮觀則人力凋盡亂亡斯作故戒云雖有榮觀當須燕爾安處超然遠離而不顧也奈何萬乘之主而以身輕天下疏天子提封百萬井出賦六十四萬井出戎馬百萬匹兵車萬乘故云萬乘之主奈何者傷嘆之辭也天下者大寶之位也夫萬乘之主四海必同當令子孫千億本枝百代善建則無為偃化善抱則有截歸仁奈何承此重器耽樂是從以身充欲淪胥以敗是以一身之欲而輕大寶之位甚可傷嘆故曰奈何輕則失臣躁則失君疏夫君多輕易必煩擾煩擾則人散誰與為臣故云輕則失臣此戒人君也為人臣者當量能受爵無速官謗若矯迹干祿飾詐祈榮躁求若斯禍敗尋至坐招竄殛焉得事君故云躁則失君此申戒人臣也唐玄宗御製道德真經疏卷之三
