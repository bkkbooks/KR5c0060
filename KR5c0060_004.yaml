front:
  text: 唐玄宗御製道德真經疏卷之四效四
  hash: sha256:ce3d30282b7ca18be421e31d84441deafdc9c2a22ece33f5b9c7a8f97dafbd90
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0060_HFL_004-001a, image: hfl/0356/0356-128.png}
body:
  text: 善行無轍迹章第二十七前章明重靜為君以戒身輕天下此章明行言無滯欲令常善救人守重靜理在無為善行言貴乎忘遺首標五善之行次明善救之慈故善下暢兼忘之訓雖知下結妙要之㫖爾善行無轍迹疏此明法性清淨也行謂修行也法性清淨是曰重玄雖藉勤行必須無著次來次滅雖行無行相與道合故云善行能如此則空有一齊境心俱淨欲求轍迹不亦難乎故云善行無轍迹善言無瑕謫疏此明善行之人不滯言教也瑕病也謫責也言謂教也夫善行無迹則能了言教不為執滯於言忘言是善言也能如此遺象存意理照言忘於彼言教一無病責故云善言無瑕謫善計者不用籌算疏此明言教無滯則不異門也夫執言滯行辨是與非適令巧曆亦不能計若能了諸法皆方便門究竟清淨不生他見則無勞籌策算數自能深入一乘善計若斯何勞籌算故云善計者不用籌算善閉者無關楗而不可開疏云此明不計異門則欲心自閉也橫曰關竪曰楗夫善行善閉不耽不滯則心服清淨境塵不起故云善閉雖無關楗其可開乎故云善閉無關楗而不可開善結者無繩約而不可解疏此明善閉之人心與道合也結繫也繩索也約束也解散也夫坐忘遺照深契道源於諸法中盡能不滯繫心於此故云善結夫用繩約者繩散則約解以道結者心靜則道冥適使萬緣盡興終能一無所染雖無繩索約束豈可解而散乎故云善結無繩約而不可解是以聖人常善救人故無棄人疏是以者引下以明上也言聖人心雖凝寂教則流通故常用善能以救人必令釋然而達解大慈平等無所偏隔凡是於人盡皆善誘故云常善救人故無棄人常善救物故無棄物疏物者通有識無識也救人善教故不棄人救物善心亦無棄物令動植咸遂無有夭傷者故云常善救物故無棄物是謂襲明疏襲密用也明了悟之善行救人在於忘遣若滯教矜有轍迹必存故雖常救人終使慧心無滯如此密用則悟了故云是謂襲明故善人者不善人之師疏師法也夫善人者離諸愛染則心清淨於法無滯則教圓通取喻於水物來斯鑒所鑒者則形而有象能鑒者見象而無心善人正慧若斯故可為不善人之師法也不善人善人之資疏資取也夫火有炎寒者附之聞道勤行必資宗匠既說先生之善須伏弟子之勞則不善之人善人可取以役使爾不貴其師不愛其資雖知大迷是為要妙疏夫初地進修兩存學相未能忘教故貴愛師資若能了其行門則學無所學師資之名既去貴愛之字不存然此章大宗教之忘遣語以漸頓不無階級論其造極是法都空故前舉為師為資示進修之路後云不貴不愛導悟證之門則明所以貴師為存學相學相既空自無所貴所以愛資為存教相於教兼忘故不愛資相忘江湖自無濡沫乍聞斯道凡俗不悟執學滯教則必以為大迷故老君格量云雖知凡俗以為大迷於道而論是謂要妙也知其雄章第二十八前章明行言不執常善所以救人此章明雌辱為行常德於焉復朴首標知雄等三段明修行則漸造於極次云朴散下兩句示造極則必有成終云大制一句論聖功之御用以結成其深旨知其雄守其雌為天下溪疏知辨識也雄剛躁也雌柔靜也夫物貴全和法求中道雄則過亢雌則卑弱俱未適中於善行必當緣篤以為經故知其雄躁則當守其雌靜守其雌靜亦當知其雄躁知雄守雌則可知雄守雄則敗敗則妨行故特戒守雌柔能守雌柔是謂謙德物所歸往如水歸溪矣爾雅曰水注川曰溪為天下溪常德不離復歸於嬰兒疏知雄守雌是為善行物所歸往為天下溪能如此者則真常之德曾不離散常德不散即是全和全和之人少私寡欲泊然未兆乃如嬰兒故云復歸於嬰兒也知其白守其黑為天下式疏白昭明也黑暗昧也式法也夫能守雌靜則德行昭明德雖昭明不以矜物當如暗昧自守淳和能如此則可為天下之法式矣為天下式常德不忒復歸於無極疏忒差忒也極窮極也知白守黑是謂德全德全之人可為天下法式則真常之道隨應而用應無差忒用亦不窮故云復歸於無極知其榮守其辱為天下谷疏榮尊榮也辱卑辱也夫為天下法式則其德尊榮德雖尊榮常守卑辱以和為量無不含容如彼空谷物來斯應故云為天下谷為天下谷常德乃足復歸於朴疏朴道也虛受應物如彼谷神真常之德是乃圓足足則復歸於朴爾夫道為德體德為道用語其用則云常德乃足論其體則云復歸於朴歸朴則妙本清淨常德則應用無窮非天下之至通其孰能與於此者朴散則為器聖人用之則為官長疏器形器也自知雄已下論修性反德則復歸於道此云朴散為器者明德全合道即能應用應用迹粗涉於形器故云朴散則為器也既涉形器其材用必有精粗故凡人用之適能獨全淳朴聖人弘濟則為群材之官長爾故大制不割疏此明聖人用道也夫聖人德全大制群有法乾坤之施灑雨露之恩各暢其和不知其力令動植之物咸遂生成曾不割傷以為己用故云大制不割將欲取天下章第二十九前章明雌辱為行常德必歸於朴此章明矜執則失神器故不可為首標將欲下六句明寶位之有所在以戒奸亂之臣執者失之一句示曆數之不于常將警昏淫之主故物下辨物倚伏之數是以聖人下戒人君甚泰之尤將欲取天下而為之吾見其不得已疏天下者大寶之位也夫皇天命帝大制群生必待曆數在躬然後君臨萬宇而奸亂之賊凶暴之夫將欲以力取天下而為之主既誅夷之不暇何天祿之可望故老君戒云吾見其如此之人必不得所為之事已語助也天下神器不可為也為者敗之疏天下大寶之位所以不可力為也者為是天地神明之器將以永終聖德之君而令流布愷悌之化豈使凶暴之夫力為而得毒螫天下乎是知必不可為為亦必敗此戒奸亂之賊臣也執者失之疏人君者或撥亂反正或繼體守文皆將昭德塞違恤隱求瘼若執有斯位凌虐神主坐令國亂無象遂使天道禍淫神怒人怨是生灾濔亂離斯作誰奉為君當失斯位矣此戒帝王也故物或行或隨或詬或吹或强或羸或載或隳疏此明凡物不常事亦倚伏也詬暖氣也吹寒氣也强壯也羸弱也載事也隳壞也且夫為之則敗執之則失亦如凡物或行之於前或隨之於後或詬之使暖或吹之使寒或有扶持使强或抑損之令弱或有引而載事或推之而隳壞且同糾纏不可凖繩唯當以欲從人方可樂推而不厭爾是以聖人去甚去奢去泰疏是以理天下之聖人睹行隨之不常知矜執之必失故約己檢身割貪制欲去造作之甚者去服玩之奢者去情欲之泰者論名數且為三目徵其實乃同其一條甚奢泰者皆過分爾以道佐人主章第三十前章明矜執則失是以去甚去奢去泰此章明兵强好還不可果其矜伐首云以道戒臣不以兵為輔佐師之所處下明好兵則必致不祥故善者下示不得已而方用物壯下結恃强而必敗以道佐人主者不以兵强天下其事好還疏以用也佐輔也還報也言為人臣者當用道化無為輔佐人主致君堯舜是曰股肱舞干羽於兩階修文德於四海令執大象而天下往太階平而寰宇清若震耀戈甲之威窮黷侵伐之事亢兵以加彼彼必應之其事既好還報則勝負之事誰能預尅師之所處荆棘生焉大軍之後必有凶年疏師軍旅也又易曰師衆也夫興師動衆則人勞於役行賫居送則妨功害農農事不修故生荆棘大軍之後積費既多和氣致祥兵氣感害水旱相繼稼穡不生故必有凶荒之年以報窮兵之怨爾故善者果而已不敢以取强疏春秋曰殺敵曰果今明殺敵者令不相侵止其為暴是知殺敵為果即止敵也老君曰凡事不得已而欲用兵用兵之善但求止殺令不為寇必不以衆暴寡凌人取强取强則事好還報是以戒令不敢故云不敢以取强果而勿矜果而勿伐果而勿驕疏夫用兵之善果於止敵止敵自矜未名善勝故雖止敵愼勿矜誇矜誇則傷於取功故雖果於止敵戒云勿伐其功伐取其功是則自為驕泰驕泰則樂殺故敗不旋踵此為炯戒可不愼乎果而不得已是果而勿强疏夫果於止敵者非好勝而凌人也但前敵來侵事不得已敢去果而不得已已止也用兵應敵是非求勝能如此者勝不恃强故云果而勿强物壯則老是謂不道不道早已疏凡物壯極則老兵强極則敗故兵之恃强猶物之用壯物用壯適足以速其衰老兵恃强則不可全其善勝兹二事者是謂不合於道賢臣明主知其不合於道當須早止不為故云不道早已已止也夫佳兵章第三十一前章明强兵好還不可果其矜伐此章明佳兵物或惡之不得已而用之首則陳戒不祥明有道者不處次云勝而不美示樂殺之為非吉事下舉喻以明結以喪禮處之所以表非樂戰夫佳兵者不祥之器疏佳好也兵者韜略之屬也祥善也器材器也君子進德修業必愼厥初藏器於身俟時而動當遊心道德之囿閲思墳詰之林使光昭令名開濟成務而乃有以兵謀韜略為好者也夫謀略之設以正為奇謀兵鈐之書先聲後實皆在乎攻戰殺伐故為不善之材器爾物或惡之故有道者不處疏畜德於身是為能事既為不祥之器是以凡物尚或惡之况有道君子焉肯處身於此故云有道者不處君子居則貴左用兵則貴右疏左陽也右陰也陽好生陰好殺好生故平居所貴好殺故用兵所貴兵者不祥之器非君子之器疏上文云佳兵者不祥之器所以明用兵則尚右而好殺有道者故不處之此云兵者不祥之器對結上文明非君子之器君子以道德為材器故無不利爾不得已而用之恬淡為上疏夫文德者理化之器兵謀者蓋其輔助也故文則經緯天地武則克定禍亂雖天生五材廢一不可而武功之用定節制宜是知用之有本末行之有逆順皆在乎事不得已而後應之謂四夷來侵王師薄伐所當示之以恩惠綏之以道德既同蚊蚋之螫故無憑怒之心推此而言以恬淡為上也勝而不美而美之者是樂殺人疏夫不能以德懷來而用兵求戰勝故雖克勝猶必多德薄不以為美夫勝必殺故以勝為美者是好樂殺也夫樂殺人者不可得志於天下疏夫天地好生物皆含養仁人者當順天德以全濟為務焉可苟逞詐力以快貪殘之人人必不附欲求得志不亦難乎故好樂殺人即不可得志於天下矣吉事尚左凶事尚右疏左陽而生則吉故吉事尚左右陰而殺則凶故凶事尚右禮記檀弓曰夫子與門人立拱而尚右二三子亦尚右夫子曰二三子之嗜學也我則有姊之喪故也二三子復尚左偏將軍處左上將軍處右言以喪禮處之疏上將主軍則專殺故處右偏將為副不專殺故處左今左尊而右卑上將軍却居右者言用兵之道同於喪禮尚右今上將軍居右是以喪禮處置之爾殺人衆多以悲哀泣之疏夫戰而求勝必殺人衆多勝而不美故悲哀傷泣夫人惟邦本本固邦寧今交戰殺之故仁心惻隱為之哀泣不亦宜乎戰勝則以喪禮處之疏夫戰而獲勝勝則受爵武功居右是非吉位故云喪禮處之但以戰為不祥之器爾亦何必服縗扶杖然後稱之為喪禮乎諸注此義者皆云古有斯禮尋閲墳典既無所據今所未安故不録也又引秦伯向師而哭者此乃哀敗非戰勝也道常無名章第三十二前章明佳兵不祥故有道不處此章明侯王守道則萬物自賓首標無名將以明道次舉守道而能降瑞始制下廣其制用譬道下將示結成道常無名疏應用不窮唯感所適道之常也常在應用其應非一故於常無名故云道常無名朴雖小天下不敢臣疏朴妙本也語其通生則謂之道論其精一則謂之朴故云小爾而應用匠成通生一切則至大也故無敢以道為臣者爾侯王若能守萬物將自賓疏言侯王若能抱守妙本精一無為無事則入埏仰化四海歸仁沐德飲和將自賓伏矣天地相合以降甘露疏侯王守道以致和平則無凌濔灾害地平天成二氣交泰以相和合降灑甘露善瑞侯王也人莫之令而自均疏莫無也天降甘露惠施無心人無命令自均若一亦如王侯稱物平施無偏無黨既惠化而大同自東自西亦何思而不服又解云言侯王守道以致善瑞則人自和平無煩命令自然均一爾始制有名名亦既有疏制御也有名者天下有名之物也既盡也言侯王抱守精一則天降善瑞惠化無心均平若一如此始能制御有名之物物歸有道故有名之物亦盡為侯王所有矣夫亦將知止知止所以不殆疏殆危殆也侯王守道而化萬物當自賓服則夫有名之物亦將知依止於侯王能依止有道之君所以無危殆之事矣故云知止所以不殆譬道之在天下猶川谷之與江海疏此結侯王守道則天必應之故云譬有道之君在理天下陶以仁德則自致太平和氣感天天瑞必應猶川谷之水而與江海通流爾知人章第三十三前章明侯王守道則萬物自賓此章明所以賓服有道之君皆由自知自勝自知則明了自勝則全强結以死而不亡戒令不違天理爾知人者智自知者明疏知識察也夫心與境合是以生知生知之心識察前事是名知法言人役心生智知前人之美惡者則俗謂之智爾若反照內察無聽以心了心觀心不生知法能如此者是謂明了故云知人者智自知者明勝人者有力自勝者强疏勝人者謂以權勢制勝於人如此之人適可謂之有力爾自勝者自能制勝其心使心柔弱柔弱之道物不能加故可全其强爾故下經云守柔曰强又曰柔勝强故曰自勝者强知足者富强行者有志疏知足在心心若知足則無貪求雖簞食瓢飲傲然自足可謂富矣强勉力行曾不懈怠自知自勝終久不渝可謂有志節矣不失其所者久疏知足强力等行人所常行若不失其所恆即是久能行道者矣又解動不失所者則可以長久死而不亡者壽疏死者分理之終亡者夭枉之數壽者一期之盡言委順得常不失天理頽然任化而去者得一期之盡可謂壽矣若不鞭其後則生理不全單豹有嬰兒之色張毅有豐高之貴不終天理焉得謂之壽乎故莊子曰天下莫壽於殤子而彭祖為夭大道泛兮章第三十四前章明賓服有道之君由能自勝此章明能成光大之業皆為法道忘功首標大道泛兮示左右略無封畛次云功成不有明小大難與為名是以聖人下舉聖人不貴其身以成光大之業大道泛兮其可左右疏泛兮者無繫之貌也言道之為物非陰非陽非柔非剛泛然無繫能應衆象可左可右無所偏名故莊子曰夫道未始有封萬物恃之以生而不辭功成不名有疏言天地萬物皆恃賴大道通生之功以全其生理而大道化生妙本無心雖則物恃以生而道不辭以為勞倦又解云物不辭謝於道爾功者生成之功也言大道生物之功備成而不以其物為己之有又解云道之生物德備功成其功雖成曾不名有言忘功也愛養萬物而不為主常無欲可名於小疏此聲解義也云可名於小者言不可名小爾夫道生萬物愛養熟成而不為主宰於彼萬物常無欲心豈是道之狹小邪故云可名於小者言不可名小爾萬物歸之不為主可名於大疏萬物歸之者歸道生成之功也言萬物歸道道不為主有此萬物棄而不收豈是道不廣大故云可名於大爾言不可名大道爾既云可左可右所以非小非大非小非大固難與為名注云有萬不同者莊子又也是以聖人終不為大故能成其大疏言理天下之聖人布德施惠淳風偃化物遂生成法道忘功不自為尊大故能成其光大之業爾唐玄宗御製道德真經疏卷之四
